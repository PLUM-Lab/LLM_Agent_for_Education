<!DOCTYPE html>
<html>
<head>
    <title>Knowledge Coverage иҜҠж–ӯе·Ҙе…·</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            padding: 20px;
            max-width: 1200px;
            margin: 0 auto;
        }
        .section {
            margin: 20px 0;
            padding: 15px;
            border: 1px solid #ddd;
            border-radius: 5px;
        }
        .error { color: red; }
        .warning { color: orange; }
        .success { color: green; }
        pre {
            background: #f5f5f5;
            padding: 10px;
            border-radius: 3px;
            overflow-x: auto;
        }
        button {
            padding: 10px 20px;
            background: #4CAF50;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            margin: 5px;
        }
        button:hover {
            background: #45a049;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            margin: 10px 0;
        }
        th, td {
            border: 1px solid #ddd;
            padding: 8px;
            text-align: left;
        }
        th {
            background-color: #4CAF50;
            color: white;
        }
    </style>
</head>
<body>
    <h1>Knowledge Coverage иҜҠж–ӯе·Ҙе…·</h1>
    
    <div class="section">
        <h2>1. иҫ“е…Ҙз”ЁжҲ·еҗҚ</h2>
        <input type="text" id="userName" placeholder="дҫӢеҰӮ: FullTest" style="padding: 8px; width: 200px;">
        <button onclick="loadProfile()">еҠ иҪҪProfile</button>
    </div>
    
    <div class="section">
        <h2>2. Profile жҰӮи§Ҳ</h2>
        <div id="profileOverview"></div>
    </div>
    
    <div class="section">
        <h2>3. зҹҘиҜҶз»„д»¶еҲҶжһҗ</h2>
        <div id="componentAnalysis"></div>
    </div>
    
    <div class="section">
        <h2>4. й—®йўҳиҜҠж–ӯ</h2>
        <div id="diagnosis"></div>
    </div>
    
    <div class="section">
        <h2>5. жҺ§еҲ¶еҸ°иҫ“еҮә</h2>
        <pre id="consoleOutput"></pre>
    </div>

    <script>
        let profile = null;
        let allQuestions = [];
        
        function log(message, type = 'info') {
            const output = document.getElementById('consoleOutput');
            const timestamp = new Date().toLocaleTimeString();
            const color = type === 'error' ? 'red' : type === 'warning' ? 'orange' : 'black';
            output.innerHTML += `<span style="color: ${color}">[${timestamp}] ${message}</span>\n`;
            output.scrollTop = output.scrollHeight;
            console.log(message);
        }
        
        async function loadProfile() {
            const userName = document.getElementById('userName').value.trim();
            if (!userName) {
                alert('иҜ·иҫ“е…Ҙз”ЁжҲ·еҗҚ');
                return;
            }
            
            log(`ејҖе§ӢиҜҠж–ӯз”ЁжҲ·: ${userName}`);
            
            // еҠ иҪҪprofile
            try {
                const key = 'student_profile_' + userName;
                const stored = localStorage.getItem(key);
                if (!stored) {
                    log(`вқҢ жңӘжүҫеҲ°profile: ${key}`, 'error');
                    return;
                }
                
                profile = JSON.parse(stored);
                log(`вң… жҲҗеҠҹеҠ иҪҪprofile: ${userName}`);
                
                // еҠ иҪҪйўҳзӣ®
                await loadQuestions();
                
                // еҲҶжһҗ
                analyzeProfile();
            } catch (e) {
                log(`вқҢ еҠ иҪҪprofileеӨұиҙҘ: ${e.message}`, 'error');
            }
        }
        
        async function loadQuestions() {
            try {
                const response = await fetch('generated_domain_questions.json');
                if (!response.ok) {
                    log('вҡ пёҸ ж— жі•еҠ иҪҪйўҳзӣ®ж–Үд»¶пјҢе°ҶдҪҝз”Ёprofileдёӯзҡ„ж•°жҚ®', 'warning');
                    return;
                }
                
                const text = await response.text();
                allQuestions = JSON.parse(text);
                log(`вң… жҲҗеҠҹеҠ иҪҪ ${allQuestions.length} йҒ“йўҳзӣ®`);
            } catch (e) {
                log(`вҡ пёҸ еҠ иҪҪйўҳзӣ®еӨұиҙҘ: ${e.message}`, 'warning');
            }
        }
        
        function analyzeProfile() {
            if (!profile) return;
            
            // жҰӮи§Ҳ
            const overview = document.getElementById('profileOverview');
            const components = Object.entries(profile.knowledgeMap || {});
            const known = components.filter(([k, v]) => v.status === 'known').length;
            const unknown = components.filter(([k, v]) => v.status === 'unknown').length;
            const coverage = components.length > 0 ? Math.round((known / components.length) * 100) : 0;
            
            overview.innerHTML = `
                <p><strong>з”ЁжҲ·еҗҚ:</strong> ${profile.userName}</p>
                <p><strong>е·Іеӣһзӯ”й—®йўҳж•°:</strong> ${profile.questionsAnswered || 0}</p>
                <p><strong>зҹҘиҜҶз»„д»¶жҖ»ж•°:</strong> ${components.length}</p>
                <p><strong>е·ІзҹҘз»„д»¶ж•°:</strong> <span class="${known > 0 ? 'success' : 'error'}">${known}</span></p>
                <p><strong>жңӘзҹҘз»„д»¶ж•°:</strong> ${unknown}</p>
                <p><strong>Knowledge Coverage:</strong> <span class="${coverage > 0 ? 'success' : 'error'}">${coverage}%</span></p>
            `;
            
            log(`рҹ“Ҡ ProfileжҰӮи§Ҳ: ${components.length}дёӘз»„д»¶, ${known}дёӘknown, ${unknown}дёӘunknown, Coverage: ${coverage}%`);
            
            // з»„д»¶еҲҶжһҗ
            analyzeComponents(components);
            
            // иҜҠж–ӯ
            diagnose(components);
        }
        
        function analyzeComponents(components) {
            const analysis = document.getElementById('componentAnalysis');
            
            // з»ҹи®Ў
            let hasTotalQuestions = 0;
            let missingTotalQuestions = 0;
            let correctEqualsTotal = 0;
            let correctLessThanTotal = 0;
            let correctGreaterThanTotal = 0;
            let zeroTotalQuestions = 0;
            
            const problematic = [];
            
            components.forEach(([key, component]) => {
                if (component.totalQuestionsForSubtopic === undefined) {
                    missingTotalQuestions++;
                } else if (component.totalQuestionsForSubtopic === 0) {
                    zeroTotalQuestions++;
                    problematic.push({key, component, issue: 'totalQuestionsForSubtopicдёә0'});
                } else {
                    hasTotalQuestions++;
                    
                    if (component.questionsCorrect === component.totalQuestionsForSubtopic) {
                        correctEqualsTotal++;
                    } else if (component.questionsCorrect < component.totalQuestionsForSubtopic) {
                        correctLessThanTotal++;
                    } else {
                        correctGreaterThanTotal++;
                        problematic.push({key, component, issue: 'questionsCorrect > totalQuestionsForSubtopic'});
                    }
                }
            });
            
            // и®Ўз®—е®һйҷ…еә”иҜҘзҡ„coverage
            const shouldBeKnown = correctEqualsTotal;
            const shouldBeCoverage = components.length > 0 ? Math.round((shouldBeKnown / components.length) * 100) : 0;
            
            analysis.innerHTML = `
                <h3>з»ҹи®ЎдҝЎжҒҜ</h3>
                <table>
                    <tr>
                        <th>йЎ№зӣ®</th>
                        <th>ж•°йҮҸ</th>
                        <th>иҜҙжҳҺ</th>
                    </tr>
                    <tr>
                        <td>жңүtotalQuestionsForSubtopic</td>
                        <td>${hasTotalQuestions}</td>
                        <td>е·ІеҲқе§ӢеҢ–жҖ»йўҳзӣ®ж•°</td>
                    </tr>
                    <tr>
                        <td>зјәе°‘totalQuestionsForSubtopic</td>
                        <td class="${missingTotalQuestions > 0 ? 'warning' : ''}">${missingTotalQuestions}</td>
                        <td>йңҖиҰҒйҮҚж–°иҜ„дј°</td>
                    </tr>
                    <tr>
                        <td>questionsCorrect === totalQuestionsForSubtopic</td>
                        <td class="success">${correctEqualsTotal}</td>
                        <td>еә”иҜҘж Үи®°дёәknown</td>
                    </tr>
                    <tr>
                        <td>questionsCorrect < totalQuestionsForSubtopic</td>
                        <td>${correctLessThanTotal}</td>
                        <td>еә”иҜҘж Үи®°дёәunknown</td>
                    </tr>
                    <tr>
                        <td>questionsCorrect > totalQuestionsForSubtopic</td>
                        <td class="error">${correctGreaterThanTotal}</td>
                        <td>ж•°жҚ®ејӮеёёпјҒ</td>
                    </tr>
                    <tr>
                        <td>totalQuestionsForSubtopic === 0</td>
                        <td class="error">${zeroTotalQuestions}</td>
                        <td>ж— жі•жүҫеҲ°еҜ№еә”йўҳзӣ®</td>
                    </tr>
                </table>
                
                <h3>йў„жңҹз»“жһң</h3>
                <p>еҰӮжһңжүҖжңүз»„д»¶йғҪжӯЈзЎ®иҜ„дј°пјҢеә”иҜҘжңү <strong class="success">${shouldBeKnown}</strong> дёӘknownз»„д»¶</p>
                <p>йў„жңҹCoverage: <strong class="success">${shouldBeCoverage}%</strong></p>
                <p>еҪ“еүҚCoverage: <strong class="${coverage === shouldBeCoverage ? 'success' : 'error'}">${coverage}%</strong></p>
            `;
            
            log(`рҹ“Ҳ з»„д»¶еҲҶжһҗ: ${correctEqualsTotal}дёӘеә”иҜҘknown, ${correctLessThanTotal}дёӘеә”иҜҘunknown`);
            log(`рҹ“Ҳ йў„жңҹCoverage: ${shouldBeCoverage}%, еҪ“еүҚCoverage: ${coverage}%`);
            
            // жҳҫзӨәй—®йўҳз»„д»¶
            if (problematic.length > 0) {
                let html = '<h3>й—®йўҳз»„д»¶</h3><table><tr><th>Key</th><th>й—®йўҳ</th><th>questionsCorrect</th><th>totalQuestionsForSubtopic</th><th>status</th></tr>';
                problematic.forEach(({key, component, issue}) => {
                    html += `<tr>
                        <td>${key.substring(0, 50)}...</td>
                        <td class="error">${issue}</td>
                        <td>${component.questionsCorrect}</td>
                        <td>${component.totalQuestionsForSubtopic}</td>
                        <td>${component.status}</td>
                    </tr>`;
                });
                html += '</table>';
                analysis.innerHTML += html;
            }
        }
        
        function diagnose(components) {
            const diagnosis = document.getElementById('diagnosis');
            const issues = [];
            
            // жЈҖжҹҘ1: жҳҜеҗҰжңүtotalQuestionsForSubtopic
            const missingTotal = components.filter(([k, v]) => v.totalQuestionsForSubtopic === undefined);
            if (missingTotal.length > 0) {
                issues.push({
                    severity: 'high',
                    message: `${missingTotal.length}дёӘз»„д»¶зјәе°‘totalQuestionsForSubtopicеӯ—ж®ө`,
                    solution: 'йңҖиҰҒиҝҗиЎҢreevaluateKnowledgeStatus()еҮҪж•°жқҘиЎҘе……иҜҘеӯ—ж®ө'
                });
            }
            
            // жЈҖжҹҘ2: questionsCorrect > totalQuestionsForSubtopic
            const incorrectCount = components.filter(([k, v]) => 
                v.totalQuestionsForSubtopic !== undefined && 
                v.questionsCorrect > v.totalQuestionsForSubtopic
            );
            if (incorrectCount.length > 0) {
                issues.push({
                    severity: 'high',
                    message: `${incorrectCount.length}дёӘз»„д»¶зҡ„questionsCorrectеӨ§дәҺtotalQuestionsForSubtopic`,
                    solution: 'иҝҷеҸҜиғҪжҳҜеӣ дёәж—§и§„еҲҷдёӢйҮҚеӨҚзӯ”йўҳеҜјиҮҙзҡ„пјҢйңҖиҰҒдҝ®жӯЈж•°жҚ®'
                });
            }
            
            // жЈҖжҹҘ3: totalQuestionsForSubtopic === 0
            const zeroTotal = components.filter(([k, v]) => v.totalQuestionsForSubtopic === 0);
            if (zeroTotal.length > 0) {
                issues.push({
                    severity: 'medium',
                    message: `${zeroTotal.length}дёӘз»„д»¶зҡ„totalQuestionsForSubtopicдёә0`,
                    solution: 'иҝҷдәӣз»„д»¶еңЁallQuestionsдёӯжүҫдёҚеҲ°еҜ№еә”зҡ„йўҳзӣ®пјҢеҸҜиғҪжҳҜйўҳзӣ®еә“дёҚеҢ№й…Қ'
                });
            }
            
            // жЈҖжҹҘ4: жүҖжңүз»„д»¶йғҪжҳҜunknown
            const allUnknown = components.filter(([k, v]) => v.status === 'unknown').length === components.length;
            if (allUnknown && components.length > 0) {
                issues.push({
                    severity: 'high',
                    message: 'жүҖжңүз»„д»¶йғҪжҳҜunknownзҠ¶жҖҒпјҢеҜјиҮҙCoverageдёә0%',
                    solution: 'жЈҖжҹҘquestionsCorrectжҳҜеҗҰйғҪе°ҸдәҺtotalQuestionsForSubtopic'
                });
            }
            
            if (issues.length === 0) {
                diagnosis.innerHTML = '<p class="success">вң… жңӘеҸ‘зҺ°жҳҺжҳҫй—®йўҳ</p>';
            } else {
                let html = '<h3>еҸ‘зҺ°зҡ„й—®йўҳ</h3><table><tr><th>дёҘйҮҚзЁӢеәҰ</th><th>й—®йўҳ</th><th>и§ЈеҶіж–№жЎҲ</th></tr>';
                issues.forEach(issue => {
                    const severityClass = issue.severity === 'high' ? 'error' : 'warning';
                    html += `<tr>
                        <td class="${severityClass}">${issue.severity}</td>
                        <td>${issue.message}</td>
                        <td>${issue.solution}</td>
                    </tr>`;
                });
                html += '</table>';
                diagnosis.innerHTML = html;
            }
        }
    </script>
</body>
</html>
