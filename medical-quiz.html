<!DOCTYPE html>
<!--
================================================================================
Medical Education Quiz - Interactive Learning Platform
================================================================================

Overview:
    A single-page web application that allows medical students to practice 
    clinical knowledge through multiple-choice questions generated from medical guidelines.

Architecture:
    ┌─────────────────────────────────────────────────────────────────────────┐
    │                      Medical Quiz System                                 │
    ├─────────────────────────────────────────────────────────────────────────┤
    │                                                                          │
    │   ┌─────────────┐     ┌─────────────┐     ┌─────────────────────┐       │
    │   │  questions  │     │   Frontend  │     │   ChatGPT API       │       │
    │   │   .json     │────▶│  (This file)│────▶│   (OpenAI)          │       │
    │   └─────────────┘     └─────────────┘     └─────────────────────┘       │
    │                              │                                           │
    │                              ▼                                           │
    │                       ┌─────────────┐                                   │
    │                       │ RAG Server   │ (Optional)                         │
    │                       │ (FAISS)     │                                   │
    │                       └─────────────┘                                   │
    │                                                                          │
    └─────────────────────────────────────────────────────────────────────────┘

Features:
    1. Quiz Functionality:
       - Load 200 questions from questions.json
       - Navigate between questions (Previous/Next)
       - Submit answers and view feedback
       - Explanations for each option
       - Track progress

    2. ChatGPT Integration:
       - Ask questions on any topic
       - Receive full context (question, options, answers, explanations)
       - System prompt configured as medical education tutor

    3. RAG (Retrieval-Augmented Generation):
       - Original source text chunks for each question
       - Dynamically retrieve relevant chunks via FAISS server
       - Fallback to keyword search when server unavailable
       - Source citations (PDF name + page number)

Data Flow:
    1. Page load → Fetch questions.json
    2. Display question → Student selects answer → Submit
    3. Display feedback with explanations for each option
    4. Student asks ChatGPT → Build context including:
       - Current question and options
       - Student answer vs correct answer
       - All explanations
       - Original source text chunks (from question generation)
       - Retrieved text chunks (via FAISS or keyword search)
    5. ChatGPT returns answer with citations

File Dependencies:
    - questions.json: Generated questions (from generate_questions.py)
    - api-key.js: OpenAI API key (optional, can use localStorage)
    - rag_server.py: RAG backend (optional, provides semantic search)

Usage:
    1. Start HTTP server: python -m http.server 8000
    2. Open: http://localhost:8000/medical-quiz.html
    3. (Optional) Start RAG: python rag_server.py
    4. Enter API key when prompted
    5. Start practicing!

Author: AI for Education (Wenchao Qin)
================================================================================
-->

<body>
    <!-- ====================================================================
         HTML Main Structure
         ====================================================================
         
         Page Layout (top to bottom):
         1. Question Bank Selector - Select different question sources
         2. Question Area - Display current question and options
         3. Feedback Area - Display answer results and explanations
         4. Message Area - Chat with ChatGPT
         
         ==================================================================== -->
    <div class="container">
        <!-- ============================================================
             Question Bank Selector
             ============================================================
             Function: Allow users to switch between different question banks
             
             Available Question Banks:
             - questions.json: 200 questions generated from clinical guidelines
             - qbank_combined.json: Combined question bank (Surgery + Amboss)
             - all: Merge all question banks (auto-deduplicate)
             
             Elements:
             - #qbank-selector: Dropdown selection box
             - #qbank-status: Display loading status and question count
             ============================================================ -->
        <div class="section" style="padding: 15px;">
            <div style="display: flex; align-items: center; gap: 15px;">
                <label style="font-weight: 600; color: #666;">Question Bank:</label>
                <select id="qbank-selector" style="padding: 8px 15px; border-radius: 4px; border: 1px solid #e0e0e0; font-size: 14px;">
                    <option value="questions.json">Clinical Guidelines (200 questions)</option>
                    <option value="qbank_combined.json">Combined Qbank (Surgery + Amboss)</option>
                    <option value="all">All Questions (Merge All)</option>
                </select>
                <span id="qbank-status" style="color: #666; font-size: 13px;"></span>
            </div>
        </div>

        <!-- ============================================================
             Question Display Area
             ============================================================
             Function: Display current question, options, and navigation buttons
             
             Elements:
             - #question-text: Question text container
             - #choices-list: Options list container (dynamically generated radio buttons)
             - #submit-btn: Submit answer button
             - #prev-q: Previous question button
             - #next-q: Next question button
             - #progress-info: Progress information (current question number/total)
             
             Interaction Flow:
             1. User clicks option → Select corresponding radio button
             2. User clicks submit → Check answer, display feedback
             3. User clicks navigation → Switch to previous/next question
             ============================================================ -->
        <div class="section">
            <div class="section-title">Question</div>
            <div class="question-text" id="question-text"></div>
            <div class="choices-container">
                <div class="section-title" style="margin-bottom: 10px;">Choices</div>
                <div id="choices-list"></div>
                <button class="submit-btn" id="submit-btn">Submit</button>
                <button class="submit-btn" id="prev-q" style="margin-left:10px; background: #6c757d;">Previous</button>
                <button class="submit-btn" id="next-q" style="margin-left:10px;">Next</button>
                <div id="progress-info" style="margin-top: 10px; font-size: 14px; color: #666;"></div>
            </div>
        </div>

        <!-- ============================================================
             Feedback Display Area
             ============================================================
             Function: Display answer results and explanations for each option
             
             Elements:
             - #feedback-container: Feedback content container
             
             Display Content (after submission):
             - Correct/Wrong badge (green/red)
             - Explanations for each option (correct options in green, incorrect in red)
             - Question source information (PDF name)
             
             States:
             - Before submission: Display "No feedback yet"
             - After submission: Display complete feedback information
             ============================================================ -->
        <div class="section">
            <div class="section-title">Feedback</div>
            <div class="feedback-container empty" id="feedback-container">
                No feedback yet
            </div>
        </div>

        <!-- ============================================================
             ChatGPT Conversation Area
             ============================================================
             Function: Chat with ChatGPT to get medical knowledge answers
             
             Elements:
             - #conversation-list: Conversation history container
             - #message-input: User input box
             - #message-send-btn: Send button
             
             Conversation Context:
             ChatGPT automatically receives the following context information:
             1. Current question and all options
             2. Student's answer and correct answer
             3. Explanations for each option
             4. Original source text chunks (text used to generate the question)
             5. RAG retrieved relevant text chunks
             
             Usage:
             1. Enter question in the input box
             2. Press Enter or click Send button
             3. Wait for ChatGPT response (with source citations)
             ============================================================ -->
        <div class="section" id="message-section" style="display: block !important;">
            <div class="section-title">Message</div>
            <div class="message-container">
                <div class="conversation" id="conversation-list"></div>
                <div class="message-input-container">
                    <input type="text" class="message-input" placeholder="Ask ChatGPT anything..." id="message-input">
                    <button id="message-send-btn" class="submit-btn" style="margin-left: 10px; padding: 10px 20px;">Send</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Load API key from api-key.js (ignored by Git) -->
    <script src="api-key.js"></script>

    <!-- ====================================================================
         JAVASCRIPT - Quiz Logic and ChatGPT Integration
         
         Main Sections:
         1. Example Data Structure - Reference example data format
         2. Global State Variables - Track quiz state across functions
         3. Initialization and Setup - Page load, event listeners
         4. Question Loading - Fetch and display from questions.json
         5. RAG Integration - FAISS semantic search + keyword fallback
         6. UI Rendering - Display questions, options, feedback
         7. Event Handling - Submit, navigation, chat
         8. ChatGPT API - OpenAI integration with full context
         ==================================================================== -->
    <script>
        // ====================================================================
        // Part 1: Example Data Structure
        // ====================================================================
        // These constants demonstrate the expected data format
        // Actual questions are loaded from questions.json
        
        // Example: Question before student submits answer
        const dataBeforeSubmit = {
            "QA": {
                "question": "A 25-year-old presents with RLQ pain for 8 hours. Vitals show temp 38.2°C. What is the most appropriate next step?",
                "choices": [

                ],

            },

            "conversation": [
                {

                }
            ]
        };

        const dataAfterCorrect = {
            "QA": {
                "question": "A 25-year-old presents with RLQ pain for 8 hours. Vitals show temp 38.2°C. What is the most appropriate next step?",
                "choices": [
                    "A. Order an abdominal ultrasound to evaluate for appendicitis",
                    "B. Start broad-spectrum IV antibiotics immediately without imaging",
                    "C. Schedule elective diagnostic laparoscopy in 2 weeks",
                    "D. Discharge home with oral analgesics and return precautions"
                ],
                "answer": 0,
                "student_prediction": 0
            },
            "feedback": {
                "correctness": "Correct!",
                "explaination": [
                    "A. First-line test for suspected appendicitis; confirms diagnosis before surgery, avoids unnecessary radiation.",
                    "B. Antibiotics come after diagnosis or surgical decision; premature use masks findings.",
                    "C. Appendicitis is urgent; delaying evaluation risks perforation",
                    "D. Fever + RLQ pain needs immediate imaging, not outpatient follow-up."
                ]
            },
            "conversation": [
                {
                    "user": "What is RLQ?",
                    "assistant": "Right Lower Quadrant of the abdomen, where the appendix is located."
                }
            ]
        };

        const dataAfterWrong = {
            "QA": {
                "question": "A 25-year-old presents with RLQ pain for 8 hours. Vitals show temp 38.2°C. What is the most appropriate next step?",
                "choices": [
                    "A. Order an abdominal ultrasound to evaluate for appendicitis",
                    "B. Start broad-spectrum IV antibiotics immediately without imaging",
                    "C. Schedule elective diagnostic laparoscopy in 2 weeks",
                    "D. Discharge home with oral analgesics and return precautions"
                ],
                "answer": 0,
                "student_prediction": 1
            },
            "feedback": {
                "correctness": "Wrong!",
                "explaination": [
                    "A. First-line test for suspected appendicitis; confirms diagnosis before surgery, avoids unnecessary radiation.",
                    "B. Antibiotics come after diagnosis or surgical decision; premature use masks findings.",
                    "C. Appendicitis is urgent; delaying evaluation risks perforation",
                    "D. Fever + RLQ pain needs immediate imaging, not outpatient follow-up."
                ]
            },
            "conversation": [
                {
                    "user": "What is RLQ?",
                    "assistant": "Right Lower Quadrant of the abdomen, where the appendix is located."
                }
            ]
        };

        // ====================================================================
        // Part 2: Global State Variables
        // ====================================================================
        // 
        // These variables are shared across the entire application to track 
        // quiz state and user interactions. They are initialized on page load 
        // and updated as users interact.
        //
        // State Flow:
        //   Page Load → Initialize Variables → Load Questions → User Answers → Update State → Display Feedback
        //
        // ====================================================================
        
        let currentData = null;           // Current question data being displayed (includes question, options, feedback, etc.)
        let selectedAnswer = null;        // Student's selected answer index (0=A, 1=B, 2=C, 3=D, 4=E)
        let generatedQuestions = [];      // Legacy feature: ChatGPT dynamically generated questions array
        let currentGeneratedIndex = 0;    // Current question index in allQuestions array (0-based)
        let currentQuestionMeta = null;   // Current question metadata object, contains:
                                          //   - correctIndex: Correct answer index
                                          //   - explanations: Array of explanations for each option
                                          //   - source: Question source PDF name
                                          //   - sourceChunk: Original text used to generate the question
                                          //   - sourcePage: Page number of original text
        let allQuestions = [];            // All questions loaded from JSON file
        let openAIApiKey = '';            // OpenAI API key for calling ChatGPT
        let messageChatHistory = [];      // ChatGPT conversation history for maintaining context coherence
                                          // Format: [{role: 'user', content: '...'}, {role: 'assistant', content: '...'}]

        // ====================================================================
        // Part 3: Initialization
        // ====================================================================

        // Initialize on page load
        document.addEventListener('DOMContentLoaded', async function() {
            setupEventListeners();
            setupQbankSelector();
            // Load questions from default source
            await loadQuestionsFromFile('questions.json');
        });

        // Setup question bank selector
        function setupQbankSelector() {
            const selector = document.getElementById('qbank-selector');
            if (selector) {
                selector.addEventListener('change', async function() {
                    const source = this.value;
                    await loadQuestionsFromFile(source);
                });
            }
        }

        // ============================================================
        // Load Questions from Specified Source
        // ============================================================
        // 
        // @param {string} source - Question source, optional values:
        //   - 'questions.json': Questions generated from clinical guidelines
        //   - 'qbank_combined.json': Combined question bank (Surgery + Amboss)
        //   - 'all': Merge all question banks
        //
        // Loading Process:
        //   1. Determine loading strategy based on source parameter
        //   2. Use fetch API to asynchronously get JSON data
        //   3. Update allQuestions array
        //   4. Display first question
        //   5. Update status bar to show question count
        //
        // Error Handling:
        //   - If loading fails, display error message and server startup instructions
        //
        // ============================================================
        async function loadQuestionsFromFile(source = 'questions.json') {
            const statusEl = document.getElementById('qbank-status');
            
            try {
                let questions = [];
                
                if (source === 'all') {
                    // Load all question banks (including merged file)
                    // Add timestamp parameter to force browser reload (avoid cache issues)
                    const timestamp = new Date().getTime();
                    const [clinical, combined] = await Promise.all([
                        fetch(`questions.json?t=${timestamp}`).then(r => r.json()).catch(() => []),
                        fetch(`qbank_combined.json?t=${timestamp}`).then(r => r.json()).catch(() => [])
                    ]);
                    // Merge all questions, deduplicate (based on question text)
                    const allQuestions = [...clinical, ...combined];
                    const seen = new Set();
                    questions = allQuestions.filter(q => {
                        const key = q.question?.substring(0, 100) || JSON.stringify(q);
                        if (seen.has(key)) return false;
                        seen.add(key);
                        return true;
                    });
                    if (statusEl) statusEl.textContent = `Loaded all ${questions.length} questions (after deduplication)`;
                } else {
                    // Add timestamp parameter to force browser reload (avoid cache issues)
                    const timestamp = new Date().getTime();
                    const url = source.includes('?') ? `${source}&t=${timestamp}` : `${source}?t=${timestamp}`;
                    const response = await fetch(url);
                    if (!response.ok) throw new Error('Failed to fetch');
                    questions = await response.json();
                    if (statusEl) {
                        const fileName = source.replace('.json', '');
                        statusEl.textContent = `Loaded ${questions.length} questions (${fileName})`;

                allQuestions = questions;

                // Debug: Check Amboss questions' images field

        // ============================================================
        // Convert Question Format: From JSON format to UI display format
        // ============================================================
        //
        // @param {Object} q - Original question object from JSON file
        //   - q.question: Question text
        //   - q.options: Options object {A: '...', B: '...', C: '...', D: '...', E: '...'}
        //   - q.correct_answer: Correct answer letter ('A', 'B', 'C', 'D', or 'E')
        //   - q.explanations: Explanations object for each option (optional)
        //   - q.explanation: Single explanation text (optional, qbank format)
        //   - q.tip: Tip text (optional, qbank format)
        //   - q.source: Question source PDF name
        //
        // @param {number} index - Question index in array
        //
        // @returns {Object|null} - Converted UI format object, or null (if question is invalid)
        //   - QA.question: Question text
        //   - QA.choices: Options array ['A. ...', 'B. ...', ...]
        //   - QA.answer: Correct answer index (0-4)
        //   - QA.source: Question source
        //   - explanations: Explanations array
        //
        // Special handling:
        //   - Supports 2-10 options (A-J)
        //   - Automatically skips invalid questions missing options
        //   - Compatible with multiple explanation formats (explanations/explanation/tip)
        //
        // ============================================================
        function convertQuestionFormat(q, index) {
            // Check if question is valid
            if (!q || !q.options || !q.question) {
                console.warn('Invalid question at index', index, q);
                return null;
            }
            
            // Dynamically get available option letters (supports A-J, up to 10 options)
            const allLetters = ['A', 'B', 'C', 'D', 'E', 'F', 'G', 'H', 'I', 'J'];
            const letters = allLetters.filter(letter => q.options[letter]);
            
            if (letters.length === 0) {
                console.warn('Question has no valid options:', q);
                return null;
            }
            
            const choices = letters.map(letter => `${letter}. ${q.options[letter]}`);
            const correctIndex = letters.indexOf(q.correct_answer);
            
            // Build explanations array
            const explanations = letters.map(letter => {
                if (q.explanations && q.explanations[letter]) {
                    return `${letter}. ${q.explanations[letter]}`;
                } else if (q.explanation && letter === q.correct_answer) {
                    return `${letter}. ✓ ${q.explanation}`;
                } else if (q.tip && letter === q.correct_answer) {
                    return `${letter}. ✓ ${q.tip}`;
                } else if (letter === q.correct_answer) {
                    return `${letter}. ✓ Correct answer`;
                }
                return `${letter}. Incorrect`;
            });

            return {
                QA: {
                    question: q.question,
                    choices: choices,
                    answer: correctIndex,
                    source: q.source || q.source_file || '',
                    images: q.images || []  // Pass image path array
                },
                feedback: {},
                explanations: explanations,
                tip: q.tip || '',  // Pass tip (if any)
                explanation: q.explanation || '',  // Pass explanation (if any)
                conversation: []
            };
        }

        // ============================================================
        // Load Question by Index
        // ============================================================
        //
        // @param {number} index - Question index (0-based)
        //
        // Functions:
        //   1. Validate index validity
        //   2. Reset user selection state
        //   3. Convert question format
        //   4. Set question metadata (for ChatGPT context)
        //   5. Render question to UI
        //   6. Update progress display
        //
        // Metadata (currentQuestionMeta):
        //   - correctIndex: Correct answer index
        //   - explanations: Explanations array
        //   - source: Source PDF
        //   - sourceChunk: Original text chunk
        //   - sourcePage: Page number
        //
        // ============================================================
        function loadQuestionByIndex(index) {
            if (index < 0 || index >= allQuestions.length) return;
            
            currentGeneratedIndex = index;
            selectedAnswer = null;
            
            // Clear message list (refresh when switching questions)
            const conversationList = document.getElementById('conversation-list');
            if (conversationList) {
                conversationList.innerHTML = '';
            }
            
            const q = allQuestions[index];
            // Debug info: Check images field
            if (q && q.images) {
                console.log(`🔍 Question ${index + 1} (index ${index}) images field:`, q.images);
                console.log(`   Type: ${typeof q.images}, isArray: ${Array.isArray(q.images)}, length: ${Array.isArray(q.images) ? q.images.length : 'N/A'}`);
            }
            const converted = convertQuestionFormat(q, index);
            
            // If conversion fails, skip to next question
            if (!converted) {
                console.warn('Skipping invalid question at index', index);
                if (index < allQuestions.length - 1) {
                    loadQuestionByIndex(index + 1);
                }
                return;
            }
            
            currentQuestionMeta = {
                correctIndex: converted.QA.answer,
                explanations: converted.explanations,
                source: converted.QA.source,
                // Store the source chunk for RAG context
                sourceChunk: q.source_chunk || null,
                // Store page number if available
                sourcePage: q.source_page || q.page_number || q.page || 'N/A'
            };
            loadData(converted);
            
            // Update progress display
            updateProgressDisplay();
        }

        //   - Progress information ("Question X of Y | 📄 Source")
        //

        function updateProgressDisplay() {

            const prevBtn = document.getElementById('prev-q');

            if (nextBtn) {

            }

                const q = allQuestions[currentGeneratedIndex];

        // ====================================================================
        // Part 5: RAG (Retrieval-Augmented Generation)
        // ====================================================================
        // 
        // When students ask ChatGPT questions, RAG provides relevant context from medical guidelines.
        // This improves answer quality and supports source citations.
        //
        // Two retrieval methods:
        //   1. FAISS Server (Preferred): Semantic search using vectors
        //      - Requires rag_server.py to be running
        //      - Uses OpenAI vectors for similarity calculation
        //      - ColBERTv2 reranking improves accuracy
        //
        //   2. Keyword Fallback: Simple TF-IDF-like matching
        //      - Used when FAISS server is unavailable
        //      - Searches source_chunk field in questions.json
        //      - Lower accuracy but works offline
        //
        // ====================================================================
        
        const RAG_SERVER_URL = 'http://localhost:5000';
        let ragServerAvailable = false;
        
        // Check if RAG server is available
        let ragServerInfo = null;
        
        async function checkRagServer() {
            try {
                const response = await fetch(`${RAG_SERVER_URL}/health`, { 
                    method: 'GET',
                    mode: 'cors'
                });
                if (response.ok) {
                    const data = await response.json();
                    ragServerAvailable = true;
                    ragServerInfo = data;
                    console.log(`✓ RAG Server connected:`);
                    console.log(`  - ${data.chunks_count} chunks indexed`);
                    console.log(`  - Reranker: ${data.reranker}`);
                    console.log(`  - Config: FAISS→${data.config?.num_retrieved} → Rerank→${data.config?.num_final}`);
                    return true;
                }
            } catch (e) {
                ragServerAvailable = false;
                ragServerInfo = null;
                console.log('⚠ RAG Server not available, using fallback keyword search');
            }
            return false;
        }
        
        // Initialize RAG server check
        checkRagServer();
        
        /**
         * Retrieve relevant chunks using FAISS + OpenAI Embeddings
         * Falls back to keyword matching if server unavailable
         * 
         * @param {string} query - The student's question
         * @param {number} topK - Number of chunks to retrieve
         * @returns {Array} - Array of {text, source, score} objects
         */
        async function retrieveRelevantChunksAsync(query, topK = 5) {
            // Try FAISS server first
            if (ragServerAvailable) {
                try {
                    const response = await fetch(`${RAG_SERVER_URL}/search`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ query, top_k: topK })
                    });
                    
                    if (response.ok) {
                        const data = await response.json();
                        console.log(`✓ RAG: Retrieved ${data.results.length} chunks via FAISS`);
                        return data.results;
                    }
                } catch (e) {
                    console.log('⚠ RAG server error, falling back to keyword search');
                }
            }
            
            // Fallback to keyword matching
            return retrieveRelevantChunksKeyword(query, topK);
        }
        
        /**
         * Fallback: Simple keyword-based retrieval
         */
        function retrieveRelevantChunksKeyword(query, topK = 5) {
            if (!allQuestions || allQuestions.length === 0) return [];
            
            const queryTokens = query.toLowerCase()
                .replace(/[^\w\s]/g, ' ')
                .split(/\s+/)
                .filter(t => t.length > 2);
            
            if (queryTokens.length === 0) return [];
            
            const currentSource = currentQuestionMeta?.source || '';
            const scoredChunks = [];
            const seenTexts = new Set();
            
            for (const q of allQuestions) {
                if (!q.source_chunk) continue;
                
                const chunkKey = q.source_chunk.substring(0, 100);
                if (seenTexts.has(chunkKey)) continue;
                seenTexts.add(chunkKey);
                
                if (currentQuestionMeta?.sourceChunk === q.source_chunk) continue;
                
                const chunkLower = q.source_chunk.toLowerCase();
                let score = 0;
                
                for (const token of queryTokens) {
                    const regex = new RegExp(token, 'gi');
                    const matches = chunkLower.match(regex);
                    if (matches) score += matches.length;
                }
                
                if (q.source === currentSource) score *= 1.5;
                
                if (score > 0) {
                    scoredChunks.push({
                        text: q.source_chunk,
                        source: q.source || 'Unknown',
                        score: score
                    });
                }
            }
            
            scoredChunks.sort((a, b) => b.score - a.score);
            return scoredChunks.slice(0, topK);
        }
        
        // Sync wrapper for backward compatibility
        function retrieveRelevantChunks(query, topK = 5) {
            // For sync calls, use keyword fallback
            return retrieveRelevantChunksKeyword(query, topK);
        }

        // ============================================================
        // API Key Initialization
        // ============================================================
        //
        // Key Sources (by priority):
        //   1. OPENAI_API_KEY global variable from api-key.js (recommended)
        //   2. 'openai_api_key' in browser localStorage
        //
        // Key Validation Rules:
        //   - Must start with 'sk-'
        //   - Length must be greater than 40 characters
        //   - Only contains ASCII characters (filter invisible characters)
        //
        // cleanApiKey Function:
        //   Cleans non-ASCII characters from API key to prevent API call failures due to encoding issues
        //
        // ============================================================
        
        /**
         * Clean API key, remove non-ASCII characters
         * @param {string} key - Original API key
         * @returns {string} - Cleaned API key
         */
        function cleanApiKey(key) {
            if (!key) return '';
            // Filter out all non-ASCII characters (charCode > 127)
            return String(key).split('').filter(c => c.charCodeAt(0) <= 127).join('').trim();
        }
        
        /**
         * Immediately Invoked Function: Initialize API key
         * Automatically executed on page load
         */
        (function initApiKey() {
            // Priority: Read from global variable in api-key.js
            // This is the recommended method, api-key.js is loaded in <script src="api-key.js">
            if (typeof OPENAI_API_KEY !== 'undefined' && OPENAI_API_KEY && OPENAI_API_KEY.startsWith('sk-')) {
                openAIApiKey = cleanApiKey(OPENAI_API_KEY);
                console.log('✅ API Key loaded from api-key.js');
                return;
            }
            
            // Fallback: Read from localStorage
            // Users can manually set in browser developer tools:
            // localStorage.setItem('openai_api_key', 'sk-...')
            const stored = cleanApiKey(localStorage.getItem('openai_api_key'));
            if (stored && /^sk-/.test(stored) && stored.length > 40) {
                openAIApiKey = stored;
                console.log('✅ API Key loaded from localStorage');
            } else {
                // Clean invalid localStorage entry
                if (stored) {
                    try { localStorage.removeItem('openai_api_key'); } catch (_) {}
                }
                openAIApiKey = '';
                console.warn('⚠️ No API Key found');
            }
        })();

        // ============================================================
        // Setup Event Listeners

        // ============================================================
        // Load Data to UI
        // ============================================================
        //
        // @param {Object} data - Question data object
        //   - data.QA: Question and options
        //   - data.feedback: Feedback information

        //
        // Calls three rendering functions to update UI
        //
        // ============================================================
        function loadData(data) {

            renderFeedback(data);     // Render feedback area
            renderConversation(data); // Render conversation area
        }

        // ============================================================
        // Render Question and Options
        // ============================================================
        //
        // @param {Object} data - Question data
        //
        // Renders:
        //   - Question text
        //   - Question images (if any)
        //   - Options list (radio buttons)
        //   - Submit button state
        //
        // After submission:
        //   - Disable all radio buttons
        //   - Mark user's selected answer
        //   - Disable submit button
        //
        // ============================================================
        /**
         * Format question text, detect and beautify laboratory data section
         * @param {string} text - Original question text
         * @returns {string} - Formatted HTML
         */
        function formatQuestionText(text) {
            if (!text) return '';
            
            // Detect laboratory data keywords (case-insensitive)
            const labKeywords = [
                'Laboratory studies show',
                'Laboratory studies:',
                'Laboratory:',
                'Lab studies',
                'Laboratory values',
                'Laboratory results',
                'Lab results',
                'Laboratory data',
                'Laboratory studies',
                'Lab values',
                'Lab data'
            ];
            
            // Check if contains laboratory data (case-insensitive)
            let hasLabData = false;
            let labStartIndex = -1;
            const textLower = text.toLowerCase();
            
            for (const keyword of labKeywords) {
                const index = textLower.indexOf(keyword.toLowerCase());
                if (index !== -1) {
                    hasLabData = true;
                    labStartIndex = index;
                    break;
                }
            }
            
            if (!hasLabData || labStartIndex === -1) {
                // No laboratory data, return null to indicate no special formatting needed
                return null;
            }
            
            // Split text: before laboratory data, laboratory data, after
            const beforeLab = text.substring(0, labStartIndex);
            const labAndAfter = text.substring(labStartIndex);
            
            // Try to find the end position of laboratory data (usually where options start or question ends)
            // Options usually start with "Which of the following" or "What is" etc.
            const questionEndMarkers = [
                'Which of the following',
                'What is',
                'What are',
                'What would',
                'The most likely',
                'The most appropriate',
                'The best',
                'Correct Answer:'
            ];
            
            let labEndIndex = labAndAfter.length;
            for (const marker of questionEndMarkers) {
                const index = labAndAfter.indexOf(marker);
                if (index !== -1 && index < labEndIndex) {
                    labEndIndex = index;
                    break;
                }
            }
            
            let labData = labAndAfter.substring(0, labEndIndex);
            const afterLab = labAndAfter.substring(labEndIndex);
            
            // Step 1: Fix line break issues between item names and numbers
            // Ensure item name is followed by a space, then the number, not a line break
            // Match pattern: Item name (starts with uppercase, may contain spaces, parentheses, etc.) + line break + number
            // Example: "Hemoglobin \n14.0" -> "Hemoglobin 14.0"
            labData = labData
                // Fix: Item name followed by line break, then number and unit (may have spaces)
                // Match: Item name + line break + number + unit (optional)
                .replace(/([A-Z][a-zA-Z\s\+\-\(\)]+?)\s*\n\s*(\d+\.?\d*)\s*([a-zA-Z\/\s\(\)=+\-°]*?)(?=\s*\n|$|,)/g, (match, name, value, unit) => {
                    // Ensure only one space between item name and number
                    const cleanName = name.trim();
                    const cleanValue = value.trim();
                    const cleanUnit = unit.trim();
                    return cleanUnit ? `${cleanName} ${cleanValue} ${cleanUnit}` : `${cleanName} ${cleanValue}`;
                })
                // Fix: Item name followed by line break, then only number (no unit)
                .replace(/([A-Z][a-zA-Z\s\+\-\(\)]+?)\s*\n\s*(\d+\.?\d*)(?=\s*\n|$|,|[A-Z])/g, '$1 $2')
                // Fix: Multiple consecutive line breaks, keep one
                .replace(/\n\s*\n+/g, '\n\n')
                // Ensure only one space between item name and number (remove extra spaces)
                .replace(/([A-Z][a-zA-Z\s\+\-\(\)]+?)\s{2,}(\d+\.?\d*)/g, '$1 $2')
                // Fix: No space between item name and number (direct connection)
                .replace(/([A-Z][a-zA-Z\s\+\-\(\)]+?)(\d+\.?\d*)/g, '$1 $2');
            
            // Improve lab data formatting:
            // 1. If lab data is merged into one line (no line breaks), try to reformat
            // 2. Detect common lab data formats (e.g., "Hemoglobin 14.0 g/dL")
            // 3. If lab data items are detected, try to split by lines and format alignment
            
            // Check if contains line breaks
            if (!labData.includes('\n')) {
                // No line breaks, may have been merged
                // Try to identify lab data items and reformat
                // Lab data items usually contain: Item name + value + unit
                // Example: "Hemoglobin 14.0 g/dL", "Creatinine 1 mg/dL"
                
                // Try to split by common patterns:
                // 1. Word starting with uppercase (item name) followed by number (value) and unit
                // 2. Or contains common units (g/dL, mg/dL, mEq/L, U/L, mm3, /mm3, /hpf, etc.)
                
                // Detect lab data item patterns (improved version, more accurate)
                // Match: Item name (may contain spaces, +, -, etc.) + value + unit
                const labItemPattern = /([A-Z][a-zA-Z\s\+\-\(\)]+?)\s+(\d+\.?\d*)\s*([a-zA-Z\/\s\(\)=+\-°]+?)(?=\s+[A-Z][a-zA-Z]|\s*$|,)/g;
                const matches = [...labData.matchAll(labItemPattern)];
                
                if (matches.length > 0) {
                    // Found multiple lab data items, reformat as aligned multi-line
                    const formattedItems = matches.map(match => {
                        const itemName = match[1].trim();
                        const value = match[2].trim();
                        const unit = match[3].trim();
                        // Alignment format: Item name (max 35 chars) + value (right-aligned) + unit
                        const paddedName = itemName.padEnd(35, ' ');
                        return `${paddedName}${value.padStart(8, ' ')} ${unit}`;
                    });
                    labData = formattedItems.join('\n');
                } else {
                    // If no pattern matched, try splitting by common separators
                    // Common separators: multiple spaces, tabs, colons, etc.
                    labData = labData
                        .replace(/([a-zA-Z])\s+([A-Z][a-z])/g, '$1\n$2')  // Between item names
                        .replace(/(\d+\s*[a-zA-Z\/]+)\s+([A-Z][a-zA-Z])/g, '$1\n$2')  // Value unit followed by item name
                        .replace(/([a-zA-Z])\s+(\d+\.?\d*)/g, '$1 $2');  // Keep space between item name and value
                }
            } else {
                // Already has line breaks, but may need to improve alignment
                // First fix line break issues between item names and numbers (merge to same line)
                const lines = labData.split('\n');
                const mergedLines = [];
                for (let i = 0; i < lines.length; i++) {
                    const line = lines[i].trim();
                    if (!line) {
                        mergedLines.push('');
                        continue;
                    }
                    
                    // Check if current line is item name (starts with uppercase, contains no numbers)
                    const isItemName = /^[A-Z][a-zA-Z\s\+\-\(\)]+$/.test(line) && !/\d/.test(line);
                    
                    // Check if next line is number (may have unit)
                    if (isItemName && i + 1 < lines.length) {
                        const nextLine = lines[i + 1].trim();
                        const isValue = /^\d+\.?\d*\s*[a-zA-Z\/\s\(\)=+\-°]*$/.test(nextLine);
                        
                        if (isValue) {
                            // Merge: Item name + space + number and unit
                            mergedLines.push(`${line} ${nextLine}`);
                            i++; // Skip next line, already merged
                            continue;
                        }
                    }
                    
                    mergedLines.push(line);
                }
                
                // Now process merged lines, perform alignment formatting
                const formattedLines = mergedLines.map(line => {
                    line = line.trim();
                    if (!line) return '';
                    
                    // Try to match: Item name + value + unit
                    const match = line.match(/^([A-Z][a-zA-Z\s\+\-\(\)]+?)\s+(\d+\.?\d*)\s*([a-zA-Z\/\s\(\)=+\-°]*?)$/);
                    if (match) {
                        const itemName = match[1].trim();
                        const value = match[2].trim();
                        const unit = match[3].trim();
                        // Alignment format
                        const paddedName = itemName.padEnd(35, ' ');
                        return unit ? `${paddedName}${value.padStart(8, ' ')} ${unit}` : `${paddedName}${value.padStart(8, ' ')}`;
                    }
                    // If contains colon (e.g., "Hemoglobin: 14.0 g/dL"), also try formatting
                    const colonMatch = line.match(/^([A-Z][a-zA-Z\s\+\-\(\)]+?):\s*(\d+\.?\d*)\s*([a-zA-Z\/\s\(\)=+\-°]*?)$/);
                    if (colonMatch) {
                        const itemName = colonMatch[1].trim() + ':';
                        const value = colonMatch[2].trim();
                        const unit = colonMatch[3].trim();
                        const paddedName = itemName.padEnd(35, ' ');
                        return unit ? `${paddedName}${value.padStart(8, ' ')} ${unit}` : `${paddedName}${value.padStart(8, ' ')}`;
                    }
                    // Cannot format, return original line
                    return line;
                });
                labData = formattedLines.join('\n');
            }
            
            // Build HTML: Normal text + formatted lab data + normal text
            // Use innerHTML to insert formatted HTML
            return {
                before: beforeLab,
                lab: labData,
                after: afterLab,
                hasLab: true
            };
        }
        
        function renderQuestion(data) {
            const qa = data.QA;

        // ============================================================
        // Render Feedback Area

        //
        // @param {Object} data - Question data, contains feedback object

        // Feedback Content:

        //   - Explanations list for each option
        //     - Correct option: Green background + ✓ icon
        //     - Incorrect option: Red background + ✗ icon
        //
        // States:
        //   - No feedback: Display gray dashed box "No feedback yet"
        //   - Has feedback: Display complete feedback content
        //
        // ============================================================
        function renderFeedback(data) {
            const feedbackContainer = document.getElementById('feedback-container');
            
            // Check if has feedback data
            if (!data.feedback || Object.keys(data.feedback).length === 0) {
                feedbackContainer.className = 'feedback-container empty';
                feedbackContainer.textContent = 'No feedback yet';
                return;
            }

            feedbackContainer.className = 'feedback-container';
            const feedback = data.feedback;
            const qa = data.QA;
            const correctAnswer = qa.answer;

            let html = '';
            
            // Correctness badge
            const isCorrect = feedback.correctness === 'Correct!';
            html += `<div class="correctness-badge ${isCorrect ? 'correct' : 'wrong'}">${feedback.correctness}</div>`;
            
            // Tip (if any)
            if (data.tip && data.tip.trim()) {
                html += '<div class="tip-container">';
                html += '<div class="tip-label">💡 Tip:</div>';
                
                // Process tip text: HTML escape and formatting
                let tipText = data.tip
                    .replace(/&/g, '&amp;')
                    .replace(/</g, '&lt;')
                    .replace(/>/g, '&gt;')
                    .replace(/"/g, '&quot;')
                    .replace(/'/g, '&#039;');
                
                // Convert line breaks to <br>
                tipText = tipText.split('\n').join('<br>');
                
                html += `<div class="tip-content">${tipText}</div>`;
                html += '</div>';
            }
            
            // Explanation (if any, and not displayed via explaination array)
            if (data.explanation && data.explanation.trim() && 
                (!feedback.explaination || feedback.explaination.length === 0)) {
                html += '<div class="explanation-container">';
                html += '<div class="explanation-label">📖 Explanation:</div>';
                
                // Process paragraph structure: convert \n\n to paragraph separators
                // 1. HTML escape to prevent XSS
                let explanationText = data.explanation
                    .replace(/&/g, '&amp;')
                    .replace(/</g, '&lt;')
                    .replace(/>/g, '&gt;')
                    .replace(/"/g, '&quot;')
                    .replace(/'/g, '&#039;');
                
                // 2. Convert double line breaks (paragraph separators) to paragraph tags
                // First process double line breaks (paragraph separators)
                explanationText = explanationText.split('\n\n').map(para => {
                    // Convert single line breaks within each paragraph to <br>
                    return para.trim().split('\n').join('<br>');
                }).join('</p><p>');
                
                // 3. Wrap in <p> tags
                if (explanationText) {
                    explanationText = '<p>' + explanationText + '</p>';
                }
                
                html += `<div class="explanation-content">${explanationText}</div>`;
                html += '</div>';
            }
            
            // Explanations (explanations for each option)
            if (feedback.explaination && feedback.explaination.length > 0) {
                html += '<ul class="explanation-list">';
                feedback.explaination.forEach((explanation, index) => {
                    const isCorrectChoice = index === correctAnswer;
                    html += `
                        <li class="explanation-item ${isCorrectChoice ? 'correct' : 'incorrect'}">
                            <div class="explanation-icon ${isCorrectChoice ? 'correct' : 'incorrect'}">
                                ${isCorrectChoice ? '✓' : '✗'}
                            </div>
                            <div class="explanation-text">${explanation}</div>
                        </li>
                    `;
                });
                html += '</ul>';
            }

            feedbackContainer.innerHTML = html;
            
            // Message section is always visible, no need to show/hide based on feedback
        }

        // Build 5-question set from the current case
        async function generateQuestionSet(count) {
            try {
                const caseText = dataBeforeSubmit.QA.question;
                const prompt = `Create ${count} multiple-choice questions (MCQ) based strictly on this case. Return ONLY JSON array with fields: serial (number), question (string), options (array of 4), correct (string). No prose.\nCase:\n"""${caseText}"""`;
                const result = await callOpenAIDirect(prompt);
                const reply = (result && typeof result === 'object' && result.response) ? result.response : result;
                const list = tryExtractJsonArray(reply) || [];
                if (Array.isArray(list) && list.length) {
                    generatedQuestions = list;
                    loadQuestionFromSet(0);
                }
            } catch (e) {
                console.warn('Auto-generation failed:', e);
            }
        }

        function loadQuestionFromSet(index) {
            if (!generatedQuestions.length || index < 0 || index >= generatedQuestions.length) return;
            currentGeneratedIndex = index;
            const item = generatedQuestions[index];
            // Support up to 10 options (A-J)
            const optionLetters = ['A','B','C','D','E','F','G','H','I','J'];
            const labels = Array.isArray(item.options)
                ? optionLetters.slice(0, Math.min(item.options.length, 10)).map((k,i)=> `${k}. ${item.options[i]||''}`)
                : [];

            currentQuestionMeta = {
                prompt: item.question,
                labels,
                correct: (item.correct || '').toString().trim()
            };

            // Adapt into our UI structure
            const qa = {
                number: index + 1,
                type: 'Multiple Choice',
                title: 'Generated Question',
                content: item.question
            };
            const answerOptions = optionLetters.slice(0, labels.length).map((k,i)=> ({ value: k, label: labels[i]||`${k}.` }));

            const data = { QA: { question: qa, choices: labels, answer: item.correct }, answerOptions };
            // Reuse existing render path
            currentData = { question: qa };
            document.getElementById('question-text').textContent = `${item.question} ( ${index+1} / ${generatedQuestions.length} )`;
            renderAnswerInput({ type: 'Multiple Choice' }, answerOptions);
        }

        function normalizeMCQList(arr) {
            // Support up to 10 options (A-J)
            const optionLetters = ['A','B','C','D','E','F','G','H','I','J'];
            return (arr||[])
                .filter(q => typeof q === 'object')
                .map((q,i) => {
                    // Support up to 10 options, but keep at least 2
                    const opts = Array.isArray(q.options) ? q.options.slice(0, 10) : [];
                    // If fewer than 2 options, supplement to 2 (minimum requirement)
                    while (opts.length < 2) opts.push('');
                    const correct = String(q.correct || '').trim().toUpperCase();
                    return {
                        serial: Number(q.serial ?? (i+1)),
                        question: String(q.question ?? '').trim(),
                        options: opts,
                        // Validate answer is within valid range (A-J)
                        correct: optionLetters.includes(correct) ? correct : 'A',
                        answer: String(q.answer ?? '').trim()
                    };
                })
                .filter(q => q.question && q.options.every(o => typeof o === 'string'));
        }

        //

        //
        // Process:
        //   1. Validate input is not empty
        //   2. Validate API key is configured
        //   3. Display user message in conversation area
        //   4. Show "Thinking..." loading indicator
        //   5. Call callOpenAIDirect() to send request
        //   6. Remove loading indicator, display ChatGPT response
        //   7. Display error message on error
        //
        // UI State:
        //   - Disable input box and button when sending
        //   - Re-enable and focus input box after completion
        //
        // ============================================================
        async function handleMessageSubmit() {
            const input = document.getElementById('message-input');
            const message = input.value.trim();
            if (!message) return;

            if (!openAIApiKey) {
                alert('API Key not configured. Please check the code.');
                return;
            }

            // Add user message to conversation
            addMessageToConversation('user', message);
            input.value = '';
            input.disabled = true;
            document.getElementById('message-send-btn').disabled = true;

            // Show loading indicator
            const loadingId = addMessageToConversation('assistant', 'Thinking...', true);

            try {
                // Call OpenAI API and get response with chunks info
                const result = await callOpenAIDirect(message);
                const response = result.response || result;
                const chunksInfo = result.chunks || null;
                
                // Remove loading message and add real response
                removeMessageFromConversation(loadingId);
                addMessageToConversation('assistant', response);
                
                // Display chunks in UI if available
                if (chunksInfo) {
                    displayChunksInUI(chunksInfo);
                }
            } catch (error) {
                console.error('ChatGPT Error:', error);
                removeMessageFromConversation(loadingId);
                addMessageToConversation('assistant', 'Sorry, I encountered an error: ' + error.message);
            } finally {
                input.disabled = false;
                document.getElementById('message-send-btn').disabled = false;
                input.focus();
            }
        }

        function addMessageToConversation(role, content, isLoading = false) {
            const conversationList = document.getElementById('conversation-list');
            
            const messageDiv = document.createElement('div');
            const messageId = 'msg-' + Date.now() + '-' + Math.random();
            messageDiv.id = messageId;
            messageDiv.className = 'message ' + role;
            
            // Support both plain text and HTML content
            if (typeof content === 'string' && content.includes('<')) {
                messageDiv.innerHTML = content;
            } else {
                messageDiv.textContent = content;
            }
            
            if (isLoading) {
                messageDiv.style.opacity = '0.6';
                messageDiv.style.fontStyle = 'italic';
            }
            
            conversationList.appendChild(messageDiv);
            conversationList.scrollTop = conversationList.scrollHeight;
            
            return messageId;
        }

        /**

         */
        function createChunkDisplay(chunk, index, type) {
            const chunkDiv = document.createElement('div');
            chunkDiv.style.cssText = 'margin-bottom: 12px; padding: 10px; background: white; border-radius: 6px; border: 1px solid #ddd;';
            
            // Chunk header
            const header = document.createElement('div');
            header.style.cssText = 'font-weight: bold; color: #2196F3; margin-bottom: 8px; font-size: 13px;';
            header.textContent = `📄 Chunk ${index}: ${chunk.source} (Page ${chunk.page})`;
            // Score display removed per user request
            chunkDiv.appendChild(header);
            
            // Chunk type badge
            const typeBadge = document.createElement('span');
            typeBadge.style.cssText = 'display: inline-block; padding: 2px 8px; background: ' + 
                (type === 'Original Question Source' ? '#4CAF50' : '#FF9800') + 
                '; color: white; border-radius: 12px; font-size: 11px; margin-left: 8px;';
            typeBadge.textContent = type === 'Original Question Source' ? 'Original' : 'Retrieved';
            header.appendChild(typeBadge);
            
            // Chunk content preview
            const contentDiv = document.createElement('div');
            contentDiv.style.cssText = 'color: #555; font-size: 12px; line-height: 1.5; margin-top: 6px; max-height: 100px; overflow: hidden; text-overflow: ellipsis;';
            const previewText = chunk.text.length > 300 ? chunk.text.substring(0, 300) + '...' : chunk.text;
            contentDiv.textContent = previewText;
            chunkDiv.appendChild(contentDiv);
            
            // Citation format
            const citationDiv = document.createElement('div');
            citationDiv.style.cssText = 'margin-top: 6px; font-size: 11px; color: #666; font-style: italic;';
            citationDiv.textContent = `Citation: [Source: ${chunk.source}, Page ${chunk.page}]`;
            chunkDiv.appendChild(citationDiv);
            
            return chunkDiv;
        }
