         */
        document.getElementById('prev-q')?.addEventListener('click', () => {
            if (!allQuestions.length) return;
            
            const prev = currentGeneratedIndex - 1;
            if (prev >= 0) {
                loadQuestionByIndex(prev);
            } else {
                alert('This is the first question.');
            }
        });

        /**
         * Next question button
         * - If there's a next question, load it
         * - If it's the last question, show completion prompt and ask if restart
         */
        document.getElementById('next-q')?.addEventListener('click', () => {
            if (!allQuestions.length) return;
            
            const next = currentGeneratedIndex + 1;
            if (next < allQuestions.length) {
                loadQuestionByIndex(next);
            } else {
                // Completed all questions
                alert(`🎉 Congratulations! You have completed all ${allQuestions.length} questions.`);
                // Ask if restart from beginning
                if (confirm('Would you like to restart from the beginning?')) {
                    loadQuestionByIndex(0);
                }
            }
        });

        // -------- Generate 5 Questions from current case --------
        document.getElementById('gen-5-btn')?.addEventListener('click', async () => {
            const caseText = currentData?.QA?.question || document.getElementById('question-text')?.textContent || '';
            const prompt = `Create 5 multiple-choice questions (MCQ) based strictly on this case. Return ONLY JSON array with fields: serial (number), question (string), options (array of 4), correct (string), answer (string). No prose.\nCase:\n"""${caseText}"""`;
            const genId = addMessageToConversation('assistant', 'Generating 5 questions...', true);
            try {
                const result = await callOpenAIDirect(prompt);
                const reply = (result && typeof result === 'object' && result.response) ? result.response : result;
                removeMessageFromConversation(genId);
                const data = tryExtractJsonArray(reply);
                if (Array.isArray(data) && data.length) {
                    renderQuestionsTable(data);
                } else {
                    addMessageToConversation('assistant', reply);
                }
            } catch (e) {
                removeMessageFromConversation(genId);
                addMessageToConversation('assistant', 'Generation failed: ' + e.message);
            }
        });

        function tryExtractJsonArray(text) {
            try {
                // direct JSON
                const j = JSON.parse(text);
                if (Array.isArray(j)) return j;
            } catch(_) {}
            // code block or mixed text -> find first [...]
            const match = text.match(/\[([\s\S]*?)\]/);
            if (match) {
                try { return JSON.parse(match[0]); } catch(_) {}
            }
            return null;
        }

        function escapeCsv(val) {
            const s = (val==null? '': String(val));
            return /[",\n]/.test(s) ? '"' + s.replace(/"/g,'""') + '"' : s;
        }

        function downloadCsv(rows) {
            if (!rows.length) return;
            const headers = Object.keys(rows[0]);
            const csv = [headers.map(escapeCsv).join(',')]
                .concat(rows.map(r => headers.map(h => escapeCsv(r[h])).join(',')))
                .join('\n');
            const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url; a.download = 'questions.csv'; a.click();
            URL.revokeObjectURL(url);
        }

        function renderQuestionsTable(items) {
            const wrap = document.getElementById('pdf-results');
            const dl = document.getElementById('pdf-download-wrap');
            wrap.innerHTML = '';
            if (!items || !items.length) { dl.style.display='none'; return; }
            const headers = Object.keys(items[0]);
            const table = document.createElement('table');
            table.style.width = '100%';
            table.style.borderCollapse = 'collapse';
            table.innerHTML = `<thead><tr>${headers.map(h=>`<th style="text-align:left;border-bottom:1px solid #e0e0e0;padding:8px;">${h}</th>`).join('')}</tr></thead>`;
            const tbody = document.createElement('tbody');
            items.forEach(row => {
                const tr = document.createElement('tr');
                headers.forEach(h => {
                    const td = document.createElement('td');
                    td.style.padding = '8px';
                    td.style.borderBottom = '1px solid #f0f0f0';
                    const v = row[h];
                    td.textContent = Array.isArray(v) ? v.join(', ') : (v==null? '': String(v));
                    tr.appendChild(td);
                });
                tbody.appendChild(tr);
            });
            table.appendChild(tbody);
            wrap.appendChild(table);

            dl.style.display='block';
            document.getElementById('download-csv').onclick = () => downloadCsv(items);
        }

        // ====================================================================
        // Part 8: ChatGPT API Integration
        // ====================================================================
        //
        // This function calls OpenAI ChatGPT API with full context:
        //
        // Context Structure:
        //   1. System Prompt - Medical tutor role and guidelines
        //   2. Current Question - Question text and all options
        //   3. Answer Information - Correct answer, student answer, result
        //   4. Explanations - Explanations for each option (A, B, C, ..., J, up to 10 options)
        //   5. Source Text Chunks - Original text used to generate the question
        //   6. Retrieved Text Chunks - 5 most relevant chunks from guidelines
        //
        // System Prompt Instructs ChatGPT:
        //   - Act as a medical education expert
        //   - Use [Source: PDF name, Page X] format for citations
        //   - Provide clear, evidence-based explanations
        //
        // ====================================================================
        
        /**
         * Call OpenAI ChatGPT API with full quiz context
         * 
         * @param {string} message - Student's question
         * @returns {Promise<string>} - ChatGPT's response
         * @throws {Error} - If API key is missing or API call fails
         */
        async function callOpenAIDirect(message) {
            if (!openAIApiKey) {
                throw new Error('API key not configured');
            }

            // Clean and validate API key
            const apiKey = cleanApiKey(openAIApiKey);
            if (!apiKey) {
                throw new Error('API key is empty');
            }

            // Build system prompt - ONLY role and citation requirements
            // Keep it concise to avoid hitting context window limits
            const systemPromptOnly = `You are an expert medical education tutor specializing in clinical medicine, surgery, and evidence-based practice.

## Your Role
- Help medical students understand complex medical concepts through clear explanations
- Use the Socratic method when appropriate to guide students to deeper understanding
- Provide accurate, evidence-based information from established medical guidelines
- Break down complex concepts into digestible parts
- Be supportive and constructive, even when correcting misconceptions

## Response Style
- Keep responses concise but comprehensive (aim for 2-4 paragraphs unless more detail is requested)
- Use bullet points for lists of differential diagnoses, symptoms, or treatment options
- If uncertain about specific details, acknowledge limitations
- Always prioritize patient safety in any clinical advice

## CRITICAL: Mandatory Source Citation Requirements
**YOU MUST INCLUDE SOURCE CITATIONS IN EVERY RESPONSE. NO EXCEPTIONS.**

### Citation Rules:
1. **Every fact, claim, or piece of information** you provide MUST be followed by a citation
2. **Citation format is MANDATORY**: **[Source: PDF名称, Page X]** or **[来源: PDF名称, 第X页]**
3. **Every chunk** you use MUST be cited with its exact PDF name and page number
4. **Multiple sources**: If you use information from multiple chunks, cite ALL of them
5. **Inline citations**: Place citations immediately after the relevant information, not at the end

### Examples of CORRECT citations:
- "The recommended treatment is **[Source: Management of Acute Appendicitis.pdf, Page 5]**..."
- "According to the guidelines **[Source: AAA Repair Guidelines.pdf, Page 12]**, the indication is..."
- "This approach is supported by **[Source: Surgical Procedures.pdf, Page 8]** and **[Source: Post-operative Care.pdf, Page 3]**..."

### Examples of INCORRECT (unacceptable):
- "According to the guidelines..." (NO citation)
- "The source mentions..." (NO citation)
- "As stated in the document..." (NO citation)
- Citations at the end only (must be inline)

### Response Structure:
Your response MUST follow this structure:
1. Answer the student's question
2. **For EVERY piece of information**, immediately cite the source: **[Source: PDF名称, Page X]**
3. If using multiple chunks, cite each one separately where relevant

**REMEMBER: A response without citations is INCOMPLETE and UNACCEPTABLE.**`;

            // Build context from current question and feedback
            let questionContext = '';
            
            if (currentData?.QA) {
                const qa = currentData.QA;
                questionContext += '\n\n---\n## CURRENT QUIZ QUESTION\n';
                
                // Question source info
                if (currentQuestionMeta?.source) {
                    const sourcePage = currentQuestionMeta.sourcePage || 'N/A';
                    questionContext += `**Question Source:** ${currentQuestionMeta.source}, Page ${sourcePage}\n`;
                }
                
                questionContext += `\n**Question:** ${qa.question}\n\n`;
                
                if (qa.choices && qa.choices.length > 0) {
                    questionContext += '**Answer Options:**\n';
                    qa.choices.forEach((choice) => {
                        questionContext += `- ${choice}\n`;
                    });
                }
                
                if (currentData.feedback && Object.keys(currentData.feedback).length > 0) {
                    const feedback = currentData.feedback;
                    // Support A-J (up to 10 options)
                    const optionLetters = ['A', 'B', 'C', 'D', 'E', 'F', 'G', 'H', 'I', 'J'];
                    const correctLetter = optionLetters[qa.answer] || '?';
                    const studentLetter = qa.student_prediction !== undefined 
                        ? optionLetters[qa.student_prediction] || '?'
                        : 'Not answered';
                    
                    questionContext += `\n**Correct Answer:** ${correctLetter}\n`;
                    questionContext += `**Student's Answer:** ${studentLetter}\n`;
                    questionContext += `**Result:** ${feedback.correctness}\n`;
                    
                    if (feedback.explaination && feedback.explaination.length > 0) {
                        questionContext += '\n**Explanations for each option:**\n';
                        feedback.explaination.forEach((exp) => {
                            questionContext += `- ${exp}\n`;
                        });
                    }
                }
                questionContext += '---\n';
            }

            // ========================================
            // RAG: Add source chunks with full citation info
            // ========================================
            let ragContext = '\n\n## SOURCE CHUNKS FROM MEDICAL GUIDELINES\n';
            ragContext += '(Use these sources to answer questions. ALWAYS cite with [Source: PDF名称, Page X])\n';
            
            // Track all sources for summary
            const allSources = [];
            
            // 1. Add the original chunk used to generate this question
            if (currentQuestionMeta?.sourceChunk) {
                const sourcePdf = currentQuestionMeta.source || 'Unknown PDF';
                const sourcePage = currentQuestionMeta.sourcePage || 'N/A';
                allSources.push({ pdf: sourcePdf, page: sourcePage, type: 'Question Source' });
                
                ragContext += '\n### 📄 CHUNK 0: Original Question Source\n';
                ragContext += `**Source PDF:** ${sourcePdf}\n`;
                ragContext += `**Page Number:** ${sourcePage}\n`;
                ragContext += `**MANDATORY Citation Format:** **[Source: ${sourcePdf}, Page ${sourcePage}]**\n`;
                ragContext += `**Example:** "According to **[Source: ${sourcePdf}, Page ${sourcePage}]**, ..."\n`;
                ragContext += '**Content:**\n```\n' + currentQuestionMeta.sourceChunk + '\n```\n';
                ragContext += `\n⚠️ **When using information from this chunk, you MUST cite: [Source: ${sourcePdf}, Page ${sourcePage}]\n`;
            }
            
            // 2. Retrieve additional relevant chunks using FAISS (async)
            let retrievedChunks = [];
            try {
                retrievedChunks = await retrieveRelevantChunksAsync(message, 5);
            } catch (e) {
                console.log('RAG retrieval failed, using fallback');
                retrievedChunks = retrieveRelevantChunksKeyword(message, 5);
            }
            
            if (retrievedChunks.length > 0) {
                let searchMethod = 'keyword matching';
                if (ragServerAvailable && ragServerInfo) {
                    searchMethod = ragServerInfo.reranker !== 'None' 
                        ? `FAISS → ColBERTv2 Reranking`
                        : 'FAISS semantic search';
                }
                ragContext += `\n### 🔍 RETRIEVED CHUNKS (via ${searchMethod}):\n`;
                
                retrievedChunks.forEach((chunk, idx) => {
                    const sourcePdf = chunk.source || 'Unknown PDF';
                    const sourcePage = chunk.page !== undefined ? chunk.page : 'N/A';
                    const score = chunk.score ? chunk.score.toFixed(3) : 'N/A';
                    allSources.push({ pdf: sourcePdf, page: sourcePage, type: 'Retrieved' });
                    
                    ragContext += `\n#### 📄 CHUNK ${idx + 1}:\n`;
                    ragContext += `**Source PDF:** ${sourcePdf}\n`;
                    ragContext += `**Page Number:** ${sourcePage}\n`;
                    // Relevance Score removed from display per user request
                    ragContext += `**MANDATORY Citation Format:** **[Source: ${sourcePdf}, Page ${sourcePage}]**\n`;
                    ragContext += `**Example:** "The guidelines **[Source: ${sourcePdf}, Page ${sourcePage}]** state that..."\n`;
                    ragContext += '**Content:**\n```\n' + chunk.text.substring(0, 1000) + (chunk.text.length > 1000 ? '...' : '') + '\n```\n';
                    ragContext += `\n⚠️ **When using information from this chunk, you MUST cite: [Source: ${sourcePdf}, Page ${sourcePage}]\n`;
                });
            }
            
            // Add source summary with MANDATORY citation reminder
            ragContext += '\n### 📚 SOURCE SUMMARY\n';
            ragContext += 'Available sources for citation:\n';
            allSources.forEach((src, idx) => {
                ragContext += `- Chunk ${idx}: **${src.pdf}**, Page ${src.page} (${src.type})\n`;
            });
            ragContext += '\n';
            ragContext += '⚠️ **MANDATORY CITATION REQUIREMENT**:\n';
            ragContext += '- You MUST cite EVERY chunk you use in your answer\n';
            ragContext += '- Use format: **[Source: PDF名称, Page X]** immediately after each fact\n';
            ragContext += '- Do NOT provide information without citations\n';
            ragContext += '- If you use information from Chunk 0, cite it: **[Source: ' + (allSources[0]?.pdf || 'Unknown') + ', Page ' + (allSources[0]?.page || 'N/A') + ']**\n';
            if (allSources.length > 1) {
                ragContext += '- If you use information from retrieved chunks, cite each one: **[Source: ' + allSources.slice(1).map(s => s.pdf + ', Page ' + s.page).join(']**, **[Source: ') + ']**\n';
            }
            
            questionContext += ragContext;

            // ========================================================================
            // Optimization: Split system prompt and user context
            // ========================================================================
            // 
            // Problem: Putting all content into system message easily exceeds context window
            // - gpt-4o-mini context: 128k tokens
            // - Actual safe limit: 80-90k tokens
            // - Extreme cases (long question + long chunk × 6) easily exceed limit
            //
            // Solution:
            //   - system message: Only role description and citation requirements (concise, ~500 tokens)
            //   - user message: Contains full context (question, chunks, student question)
            //
            // Benefits:
            //   - Avoid context window overflow
            //   - system message more stable, won't be frequently replaced
            //   - Follows OpenAI best practices
            //
            // ========================================================================
            
            // Build full context for user message
            // This includes: current question, feedback, source chunks, and student's question
            // Add MANDATORY citation requirement at the end
            const citationRequirement = `\n\n---\n## ⚠️ MANDATORY REQUIREMENT\n\nYou MUST include citations in your answer. For EVERY piece of information you provide:\n1. Immediately cite the source using: **[Source: PDF名称, Page X]**\n2. Use the exact PDF name and page number from the chunks above\n3. Do NOT provide any information without a citation\n4. If you use multiple chunks, cite each one separately\n\nExample: "The treatment protocol **[Source: ${allSources[0]?.pdf || 'Guidelines.pdf'}, Page ${allSources[0]?.page || 'X'}]** recommends..."\n\nYour answer MUST include citations. A response without citations is incomplete.`;
            
            const fullContext = questionContext + `\n\nStudent Question: ${message}` + citationRequirement;

            // Prepare messages for OpenAI
            // System message: ONLY role and citation requirements (kept concise)
            // User message: Full context (question, chunks, student query)
            const messages = [
                {
                    role: 'system',
                    content: systemPromptOnly  // Only role and citation format (~500 tokens)
                },
                // Add conversation history
                ...messageChatHistory,
                // Add current user message with full context
                {
                    role: 'user',
                    content: fullContext  // Question context + source chunks + student query (variable length)
                }
            ];

            // Use XMLHttpRequest to avoid headers encoding issues
            const requestData = JSON.stringify({
                model: 'gpt-4o-mini',
                messages: messages,
                max_tokens: 1000,
                temperature: 0.7
            });

            // Make API call using XMLHttpRequest
            // Build Authorization header value as ASCII-only string
            const authHeader = 'Bearer ' + apiKey;
            
            const assistantResponse = await new Promise((resolve, reject) => {
                const xhr = new XMLHttpRequest();
                xhr.open('POST', 'https://api.openai.com/v1/chat/completions', true);
                
                try {
                    // Set headers one at a time with error handling
                    xhr.setRequestHeader('Content-Type', 'application/json');
                    xhr.setRequestHeader('Authorization', authHeader);
                } catch (e) {
                    reject(new Error('Failed to set headers: ' + e.message + '. API Key length: ' + apiKey.length));
                    return;
                }
                
                xhr.onreadystatechange = function() {
                    if (xhr.readyState === 4) {
                        if (xhr.status === 200) {
                            try {
                                const data = JSON.parse(xhr.responseText);
                                resolve(data.choices[0].message.content);
                            } catch (e) {
                                reject(new Error('Failed to parse response: ' + e.message));
                            }
                        } else {
                            try {
                                const error = JSON.parse(xhr.responseText);
                                reject(new Error(error.error?.message || 'OpenAI API error: ' + xhr.status));
                            } catch (e) {
                                reject(new Error('OpenAI API error: ' + xhr.status + ' - ' + xhr.statusText));
                            }
                        }
                    }
                };
                
                xhr.onerror = function() {
                    reject(new Error('Network error occurred'));
                };
                
                xhr.send(requestData);
            });
            
            // ========================================================================
            // Validate and Supplement Citations
            // ========================================================================
            // Check if response contains citations, if not add reminder
            let finalResponse = assistantResponse;
            
            // Check if contains citation format [Source: ...]
            const citationPattern = /\[Source:\s*[^\]]+\]/i;
            const hasCitation = citationPattern.test(assistantResponse);
            
            // If no citations, add warning and default citation
            if (!hasCitation && allSources.length > 0) {
                console.warn('⚠️ Response missing citations, adding reminder');
                
                // Add warning and default citation
                const defaultSource = allSources[0];
                const citationReminder = `\n\n---\n⚠️ **Note**: The above answer should be based on the provided medical guidelines. Main source: **[Source: ${defaultSource.pdf}, Page ${defaultSource.page}]**`;
                
                // If multiple chunks are used, also add their citations
                if (allSources.length > 1) {
                    const additionalSources = allSources.slice(1).map(s => `**[Source: ${s.pdf}, Page ${s.page}]**`).join(', ');
                    finalResponse = assistantResponse + citationReminder + `\nOther related sources: ${additionalSources}`;
                } else {
                    finalResponse = assistantResponse + citationReminder;
                }
            } else if (hasCitation) {
                // Validate citation completeness (check if all used chunks are cited)
                const citedSources = [];
                const citationMatches = assistantResponse.matchAll(/\[Source:\s*([^,]+),\s*Page\s*([^\]]+)\]/gi);
                for (const match of citationMatches) {
                    citedSources.push({ pdf: match[1].trim(), page: match[2].trim() });
                }
                
                // If cited but may be incomplete, add supplementary information
                if (citedSources.length < allSources.length && allSources.length > 1) {
                    console.log(`✓ Found ${citedSources.length} citations, ${allSources.length} sources available`);
                }
            }
            
            // Update chat history
            messageChatHistory.push({ role: 'user', content: message });
            messageChatHistory.push({ role: 'assistant', content: finalResponse });
            
            // Return response with chunks info for UI display (only when chunks were retrieved)
            // Check if this is a conversation message (has retrieved chunks or original chunk)
            const hasChunks = (currentQuestionMeta?.sourceChunk || retrievedChunks.length > 0);
            
            if (hasChunks) {
                return {
                    response: finalResponse,
                    chunks: {
                        originalChunk: currentQuestionMeta?.sourceChunk ? {
                            text: currentQuestionMeta.sourceChunk,
                            source: currentQuestionMeta.source || 'Unknown PDF',
                            page: currentQuestionMeta.sourcePage || 'N/A',
                            type: 'Original Question Source'
                        } : null,
                        retrievedChunks: retrievedChunks.map((chunk, idx) => ({
                            text: chunk.text,
                            source: chunk.source || 'Unknown PDF',
                            page: chunk.page !== undefined ? chunk.page : 'N/A',
                            score: chunk.score ? chunk.score.toFixed(3) : 'N/A',
                            type: 'Retrieved',
                            index: idx + 1
                        }))
                    }
                };
            } else {
                // For non-conversation calls (like question generation), return string directly
                return finalResponse;
            }
        }

        // ============================================================
        // Global Functions Exposed to External
        // ============================================================
        //
        // These functions can be called in browser console for debugging or external integration
        //
        // Usage Examples:
        //   // Set API key in console
        //   window.setOpenAIAPIKey('sk-your-api-key-here');
        //
        //   // Load custom question data
        //   window.loadQuizData({QA: {...}, feedback: {...}});
        //
        // ============================================================
        
        /**
         * Load question data (for backend integration)
         * @param {Object} data - Question data object
         */
        window.loadQuizData = function(data) {
            loadData(data);
        };

        /**
         * Programmatically set API key
         * @param {string} apiKey - OpenAI API key
         * 
         * Use Cases:
         *   - Quickly set key via console
         *   - Dynamically inject key during external system integration
         */
        window.setOpenAIAPIKey = function(apiKey) {
            openAIApiKey = apiKey;
            localStorage.setItem('openai_api_key', apiKey);
            // Display last 4 characters of key (for security)
            document.getElementById('openai-api-key').value = '••••••••••••' + apiKey.slice(-4);
            updateApiKeyStatus(true);
            enableMessageInput();
        };
        
        // ============================================================
        // Image Modal Functionality
        // ============================================================
        /**
         * Display image zoom modal
         * @param {string} imagePath - Image path
         */
        function showImageModal(imagePath) {
            // Get or create modal
            let modal = document.getElementById('image-modal');
            if (!modal) {
                modal = document.createElement('div');
                modal.id = 'image-modal';
                modal.className = 'image-modal';
                modal.onclick = function() {
                    // Click background to close modal
                    hideImageModal();
                };
                document.body.appendChild(modal);
            }
            
            // Create or update image element
            let img = modal.querySelector('img');
            if (!img) {
                img = document.createElement('img');
                img.onclick = function(e) {
                    // Clicking image itself doesn't close (prevent event bubbling)
                    e.stopPropagation();
                };
                modal.appendChild(img);
            }
            
            img.src = imagePath;
            modal.classList.add('active');
            
            // Press ESC key to close
            document.addEventListener('keydown', function escHandler(e) {
                if (e.key === 'Escape') {
                    hideImageModal();
                    document.removeEventListener('keydown', escHandler);
                }
            });
        }
        
        /**
         * Hide image zoom modal
         */
        function hideImageModal() {
            const modal = document.getElementById('image-modal');
            if (modal) {
                modal.classList.remove('active');
            }
        }

    </script>
