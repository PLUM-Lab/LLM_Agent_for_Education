        async function handleMessageSubmit() {
            const input = document.getElementById('message-input');
            const message = input.value.trim();
            if (!message) return;

            // Clear input immediately
            input.value = '';
            
            // ============================================================
            // CHECK: Are we in Socratic Dialogue mode? (Figure 1 style)
            // Natural conversation - route to Socratic processor
            // ============================================================
            if (socraticDialogueActive) {
                // Show user's message
                addMessageToConversation('user', message, false);
                
                input.disabled = true;
                document.getElementById('message-send-btn').disabled = true;
                
                try {
                    await processSocraticAnswer(message);
                } finally {
                    input.disabled = false;
                    document.getElementById('message-send-btn').disabled = false;
                    input.focus();
                }
                return;  // Don't proceed to normal ChatGPT flow
            }
            
            // ============================================================
            // Normal ChatGPT message flow
            // ============================================================
            if (!openAIApiKey) {
                alert('API Key not configured. Please check the code.');
                return;
            }

            // Add user message to conversation
            addMessageToConversation('user', message);
            input.disabled = true;
            document.getElementById('message-send-btn').disabled = true;

            // Show loading indicator
            const loadingId = addMessageToConversation('assistant', 'Thinking...', true);

            try {
                // Call OpenAI API and get response with chunks info
                const result = await callOpenAIDirect(message);
                const response = result.response || result;
                const chunksInfo = result.chunks || null;
                
                // Remove loading message and add real response
                removeMessageFromConversation(loadingId);
                addMessageToConversation('assistant', response);
                
                // Display chunks in UI if available
                if (chunksInfo) {
                    displayChunksInUI(chunksInfo);
                }
            } catch (error) {
                console.error('ChatGPT Error:', error);
                removeMessageFromConversation(loadingId);
                addMessageToConversation('assistant', 'Sorry, I encountered an error: ' + error.message);
            } finally {
                input.disabled = false;
                document.getElementById('message-send-btn').disabled = false;
                input.focus();
            }
        }

        function addMessageToConversation(role, content, isLoading = false) {

        // ============================================================

        /**

         */
        async function requestHintsInChat() {
            if (!currentQuestionMeta || !currentData) {
                addMessageToConversation('assistant', 'Please answer a question first before requesting hints.');
                return;
            }
            
            // Check if student has submitted an answer
            if (selectedAnswer === null) {
                addMessageToConversation('assistant', 'Please submit an answer first, then I can help guide you!');
                return;

            // Note: No hard limit on hint rounds - system will intelligently decide when to end
            // 注意：提示轮次无硬性限制 - 系统将智能决定何时结束
            
            // Add user's hint request to chat history (for ChatGPT context)
            const userHintRequest = currentHintRound === 0 
                ? "I need some hints to help me understand this question better."
                : "I still need more help understanding this.";
            messageChatHistory.push({ role: 'user', content: userHintRequest });
            
            // Show loading message
            const loadingId = addMessageToConversation('assistant', '<div class="hint-loading"><div class="spinner"></div>Analyzing the question...</div>', true);
            
            try {
                // Build request data
                const questionText = typeof currentData.QA?.question === 'object' 
                    ? currentData.QA.question.content || JSON.stringify(currentData.QA.question)
                    : currentData.QA?.question || '';
                
                const choices = {};
                const choicesArray = currentData.QA?.choices || [];
                choicesArray.forEach((choice, idx) => {
                    const letter = String.fromCharCode(65 + idx);
                    const cleanChoice = choice.replace(/^[A-Z]\.\s*/, '');
                    choices[letter] = cleanChoice;
                });
                
                const studentAnswerLetter = String.fromCharCode(65 + selectedAnswer);
                const correctAnswerLetter = String.fromCharCode(65 + currentQuestionMeta.correctIndex);
                
                const explanations = {};
                if (currentQuestionMeta.explanations) {
                    currentQuestionMeta.explanations.forEach((exp, idx) => {
                        const letter = String.fromCharCode(65 + idx);
                        explanations[letter] = exp;
                    });
                }
                
                const requestData = {
                    question: questionText,
                    choices: choices,
                    student_answer: studentAnswerLetter,
                    correct_answer: correctAnswerLetter,
                    explanations: explanations,
                    conversation_history: hintConversationHistory,
                    source_context: currentQuestionMeta.sourceChunk || ''
                };
                
                // Call the hint generation API
                const response = await fetch('http://localhost:5000/generate_hints', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(requestData)
                });
                
                const result = await response.json();
                
                // Remove loading message
                removeMessageFromConversation(loadingId);
                
                if (!result.success) {
                    throw new Error(result.error || 'Failed to generate hints');
                }
                
                // Update hint round (MedTutor-R1 style uses total_steps instead)
                currentHintRound++;
                
                // Store in conversation history for next round
                hintConversationHistory.push({
                    role: 'assistant',
                    content: JSON.stringify(result)
                });
                
                // Display reasoning chain in chat
                displayHintsInChat(result);
                
            } catch (error) {
                console.error('Error requesting hints:', error);
                removeMessageFromConversation(loadingId);
                
                // Fall back to local hint generation
                displayFallbackHintsInChat();
            }
        }

        // ============================================================
        // Socratic Dialogue - Natural Conversation Style (Figure 1)
        // Based on arXiv:2305.14999 "The Art of SOCRATIC QUESTIONING"
        // ============================================================
        let socraticDialogueActive = false;   // Are we in Socratic dialogue mode?
        let socraticContext = null;           // Current question context for Socratic dialogue
        
        /**
         * Start Socratic dialogue - Dynamic decomposition based on complexity
         * 
         * From arXiv:2305.14999:
         * - Complex questions → more sub-questions
         * - Wrong answers → further decomposition
         */
        function displayHintsInChat(hintData) {
            // Initialize Socratic dialogue
            socraticDialogueActive = true;
            socraticContext = {
                originalQuestion: currentData?.QA?.question || "",
                choices: currentQuestionMeta?.labels || [],
                studentAnswer: selectedAnswer,
                correctAnswer: currentQuestionMeta?.correct || "",
                conversationTurns: 0,
                decompositionRounds: 0,  // Track decomposition rounds (for reference only, no hard limit)
                shouldEnd: false
            };
            
            // Get decomposition
            const decomp = hintData.decomposition;
            const steps = decomp?.reasoning_steps || [];
            const numSteps = steps.length;
            
            // Store for context
            socraticContext.synthesis = decomp?.synthesis_step || "";
            
            // Natural conversation opening with complexity indication
            let openingText = "I see you're having some trouble with this question. Let me help you work through it.";
            
            if (numSteps >= 4) {
                openingText += " This is a complex question that requires understanding several concepts.";
            } else if (numSteps >= 3) {
                openingText += " Let's break this down step by step.";
            }
            
            const openingHtml = `
                <div style="color: #374151; font-size: 14px; line-height: 1.6;">
                    ${openingText}
                </div>
            `;
            addMessageToConversation('assistant', openingHtml, true);
            
            // Ask first question(s) based on complexity
            // 根据复杂度提问（无数量限制）
            // Simpler questions: 1 question at a time
            // 简单问题：一次一个
            // Complex questions: can show multiple initial questions
            // 复杂问题：可以显示多个初始问题
            setTimeout(() => {
                let questionHtml = "";
                
                // Determine how many questions to show initially (no hard limit)
                // 确定初始显示的问题数量（无硬性限制）
                const initialCount = numSteps;  // Show all steps, no limit
                
                if (initialCount >= 2) {
                    // Show multiple initial questions for complex topics
                    // 为复杂主题显示多个初始问题
                    questionHtml = `<div style="color: #374151; font-size: 14px; line-height: 1.7;">`;
                    
                    for (let i = 0; i < initialCount; i++) {
                        if (steps[i]) {
                            questionHtml += `<strong>${i + 1}.</strong> 🤔 ${steps[i].key_question}<br><br>`;
                        }
                    }
                    
                    questionHtml += `<em style="color: #6b7280;">Start with whichever you find easier. If you're unsure, I can break them down.</em></div>`;
                    
                    // Store for context
                    hintConversationHistory.push({
                        role: 'assistant',
                        content: `Questions: ${steps.slice(0, initialCount).map((s, i) => `${i+1}. ${s.key_question}`).join(' ')}`
                    });
                } else {
                    // Simple question - just ask one
                    questionHtml = `
                        <div style="color: #374151; font-size: 14px; line-height: 1.6;">
                            🤔 <strong>${steps[0]?.key_question || "What do you think is the key concept here?"}</strong>
                        </div>
                    `;
                    hintConversationHistory.push({
                        role: 'assistant',
                        content: `Question: ${steps[0]?.key_question}`
                    });
                }
                
                addMessageToConversation('assistant', questionHtml, true);
                
                // Update input placeholder
                const messageInput = document.getElementById('message-input');
                if (messageInput) {
                    messageInput.focus();
                    messageInput.placeholder = 'Type your answer...';
                }
            }, 800);
        }
        
        /**
         * Continue Socratic dialogue based on student's response
         * Features dynamic decomposition based on student understanding
         */
        async function processSocraticAnswer(studentAnswer) {
            if (!socraticDialogueActive || !socraticContext) return false;
            
            socraticContext.conversationTurns++;
            
            // Show thinking
            const thinkingId = addMessageToConversation('assistant', 
                '<span style="color: #6b7280;">🤔 Thinking...</span>', true);
            
            try {
                // Get Socratic response with dynamic decomposition
                const response = await callSocraticContinuation(studentAnswer);
                
                removeMessageFromConversation(thinkingId);
                
                // Convert markdown-style formatting to HTML
                // Format response (simple formatting, no special styling)
                const formattedResponse = response
                    .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
                    .replace(/\n\n/g, '<br><br>')
                    .replace(/\n/g, '<br>');
                
                // Display the response
                const responseHtml = `
                    <div style="color: #374151; font-size: 14px; line-height: 1.7;">
                        ${formattedResponse}
                    </div>
                `;
                addMessageToConversation('assistant', responseHtml, true);
                
                // Check if we should end the dialogue
                // 检查是否应该结束对话（仅基于LLM的智能判断，无硬性限制）
                if (socraticContext.shouldEnd) {
                    endSocraticDialogue();
                }
                
            } catch (error) {
                console.error('Socratic dialogue error:', error);
                removeMessageFromConversation(thinkingId);
                
                // Fallback response with a guiding question
                const fallbackHtml = `
                    <div style="color: #374151; font-size: 14px; line-height: 1.6;">
                        That's an interesting point. Let me ask you this: 
                        🤔 What do you think is the key factor that distinguishes the correct answer from your original choice?
                    </div>
                `;
                addMessageToConversation('assistant', fallbackHtml, true);
            }
            
            return true;
        }
        
        /**
         * Call OpenAI for Socratic continuation with dynamic decomposition
         * 
         * Key features:
         * 1. Evaluate if student's answer is correct
         * 2. If correct → ask next sub-question
         * 3. If wrong → decompose current question into simpler sub-questions (number determined by complexity)
         */
        async function callSocraticContinuation(studentAnswer) {
            const systemPrompt = `You are a Socratic medical tutor. You guide students by asking questions, NOT by giving answers.

## CRITICAL RULE - DO NOT REVEAL THE ANSWER:
- NEVER mention which option (A, B, C, D) is correct
- NEVER state the correct answer directly or indirectly

                }
                ragContext += `\n### 🔍 RETRIEVED CHUNKS (via ${searchMethod}):\n`;
                
                retrievedChunks.forEach((chunk, idx) => {
                    const sourcePdf = chunk.source || 'Unknown PDF';
                    const sourcePage = chunk.page !== undefined ? chunk.page : 'N/A';
                    const score = chunk.score ? chunk.score.toFixed(3) : 'N/A';
                    allSources.push({ pdf: sourcePdf, page: sourcePage, type: 'Retrieved' });
                    
                    ragContext += `\n#### 📄 CHUNK ${idx + 1}:\n`;
                    ragContext += `**Source PDF:** ${sourcePdf}\n`;
                    ragContext += `**Page Number:** ${sourcePage}\n`;
                    // Relevance Score removed from display per user request
                    ragContext += `**MANDATORY Citation Format:** **[Source: ${sourcePdf}, Page ${sourcePage}]**\n`;
                    ragContext += `**Example:** "The guidelines **[Source: ${sourcePdf}, Page ${sourcePage}]** state that..."\n`;
                    ragContext += '**Content:**\n```\n' + chunk.text.substring(0, 1000) + (chunk.text.length > 1000 ? '...' : '') + '\n```\n';
                    ragContext += `\n⚠️ **When using information from this chunk, you MUST cite: [Source: ${sourcePdf}, Page ${sourcePage}]\n`;
                });
            }
            
            // Add source summary with MANDATORY citation reminder
            ragContext += '\n### 📚 SOURCE SUMMARY\n';
            ragContext += 'Available sources for citation:\n';
            allSources.forEach((src, idx) => {
                ragContext += `- Chunk ${idx}: **${src.pdf}**, Page ${src.page} (${src.type})\n`;
            });
            ragContext += '\n';
            ragContext += '⚠️ **MANDATORY CITATION REQUIREMENT**:\n';
            ragContext += '- You MUST cite EVERY chunk you use in your answer\n';
            ragContext += '- Use format: **[Source: PDF名称, Page X]** immediately after each fact\n';
            ragContext += '- Do NOT provide information without citations\n';
            ragContext += '- If you use information from Chunk 0, cite it: **[Source: ' + (allSources[0]?.pdf || 'Unknown') + ', Page ' + (allSources[0]?.page || 'N/A') + ']**\n';
            if (allSources.length > 1) {
                ragContext += '- If you use information from retrieved chunks, cite each one: **[Source: ' + allSources.slice(1).map(s => s.pdf + ', Page ' + s.page).join(']**, **[Source: ') + ']**\n';
            }
            
            questionContext += ragContext;

            // ========================================================================
            // Optimization: Split system prompt and user context
            // ========================================================================
            // 
            // Problem: Putting all content into system message easily exceeds context window
            // - gpt-4o-mini context: 128k tokens
            // - Actual safe limit: 80-90k tokens
            // - Extreme cases (long question + long chunk × 6) easily exceed limit
            //
            // Solution:
            //   - system message: Only role description and citation requirements (concise, ~500 tokens)
            //   - user message: Contains full context (question, chunks, student question)
            //
            // Benefits:
            //   - Avoid context window overflow
            //   - system message more stable, won't be frequently replaced
            //   - Follows OpenAI best practices
            //
            // ========================================================================
            
            // Build full context for user message
            // This includes: current question, feedback, source chunks, and student's question
            // Add MANDATORY citation requirement at the end
            const citationRequirement = `\n\n---\n## ⚠️ MANDATORY REQUIREMENT\n\nYou MUST include citations in your answer. For EVERY piece of information you provide:\n1. Immediately cite the source using: **[Source: PDF名称, Page X]**\n2. Use the exact PDF name and page number from the chunks above\n3. Do NOT provide any information without a citation\n4. If you use multiple chunks, cite each one separately\n\nExample: "The treatment protocol **[Source: ${allSources[0]?.pdf || 'Guidelines.pdf'}, Page ${allSources[0]?.page || 'X'}]** recommends..."\n\nYour answer MUST include citations. A response without citations is incomplete.`;
            
            const fullContext = questionContext + `\n\nStudent Question: ${message}` + citationRequirement;

            // Prepare messages for OpenAI
            // System message: ONLY role and citation requirements (kept concise)
            // User message: Full context (question, chunks, student query)
            const messages = [
                {
                    role: 'system',
                    content: systemPromptOnly  // Only role and citation format (~500 tokens)
                },
                // Add conversation history
                ...messageChatHistory,
                // Add current user message with full context
                {
                    role: 'user',
                    content: fullContext  // Question context + source chunks + student query (variable length)
                }
            ];

            // Use XMLHttpRequest to avoid headers encoding issues
            const requestData = JSON.stringify({
                model: 'gpt-4o-mini',
                messages: messages,
                max_tokens: 1000,
                temperature: 0.7
            });

            // Make API call using XMLHttpRequest
            // Build Authorization header value as ASCII-only string
            const authHeader = 'Bearer ' + apiKey;
            
            const assistantResponse = await new Promise((resolve, reject) => {
                const xhr = new XMLHttpRequest();
                xhr.open('POST', 'https://api.openai.com/v1/chat/completions', true);
                
                try {
                    // Set headers one at a time with error handling
                    xhr.setRequestHeader('Content-Type', 'application/json');
                    xhr.setRequestHeader('Authorization', authHeader);
                } catch (e) {
                    reject(new Error('Failed to set headers: ' + e.message + '. API Key length: ' + apiKey.length));
                    return;
                }
                
                xhr.onreadystatechange = function() {
                    if (xhr.readyState === 4) {
                        if (xhr.status === 200) {
                            try {
                                const data = JSON.parse(xhr.responseText);
                                resolve(data.choices[0].message.content);
                            } catch (e) {
                                reject(new Error('Failed to parse response: ' + e.message));
                            }
                        } else {
                            try {
                                const error = JSON.parse(xhr.responseText);
                                reject(new Error(error.error?.message || 'OpenAI API error: ' + xhr.status));
                            } catch (e) {
                                reject(new Error('OpenAI API error: ' + xhr.status + ' - ' + xhr.statusText));
                            }
                        }
                    }
                };
                
                xhr.onerror = function() {
                    reject(new Error('Network error occurred'));
                };
                
                xhr.send(requestData);
            });
            
            // ========================================================================
            // Validate and Supplement Citations
            // ========================================================================
            // Check if response contains citations, if not add reminder
            let finalResponse = assistantResponse;
            
            // Check if contains citation format [Source: ...]
            const citationPattern = /\[Source:\s*[^\]]+\]/i;
            const hasCitation = citationPattern.test(assistantResponse);
            
            // If no citations, add warning and default citation
            if (!hasCitation && allSources.length > 0) {
                console.warn('⚠️ Response missing citations, adding reminder');
                
                // Add warning and default citation
                const defaultSource = allSources[0];
                const citationReminder = `\n\n---\n⚠️ **Note**: The above answer should be based on the provided medical guidelines. Main source: **[Source: ${defaultSource.pdf}, Page ${defaultSource.page}]**`;
                
                // If multiple chunks are used, also add their citations
                if (allSources.length > 1) {
                    const additionalSources = allSources.slice(1).map(s => `**[Source: ${s.pdf}, Page ${s.page}]**`).join(', ');
                    finalResponse = assistantResponse + citationReminder + `\nOther related sources: ${additionalSources}`;
                } else {
                    finalResponse = assistantResponse + citationReminder;
                }
            } else if (hasCitation) {
                // Validate citation completeness (check if all used chunks are cited)
                const citedSources = [];
                const citationMatches = assistantResponse.matchAll(/\[Source:\s*([^,]+),\s*Page\s*([^\]]+)\]/gi);
                for (const match of citationMatches) {
                    citedSources.push({ pdf: match[1].trim(), page: match[2].trim() });
                }
                
                // If cited but may be incomplete, add supplementary information
                if (citedSources.length < allSources.length && allSources.length > 1) {
                    console.log(`✓ Found ${citedSources.length} citations, ${allSources.length} sources available`);
                }
            }
            
            // Update chat history
            messageChatHistory.push({ role: 'user', content: message });
            messageChatHistory.push({ role: 'assistant', content: finalResponse });
            
            // Return response with chunks info for UI display (only when chunks were retrieved)
            // Check if this is a conversation message (has retrieved chunks or original chunk)
            const hasChunks = (currentQuestionMeta?.sourceChunk || retrievedChunks.length > 0);
            
            if (hasChunks) {
                return {
                    response: finalResponse,
                    chunks: {
                        originalChunk: currentQuestionMeta?.sourceChunk ? {
                            text: currentQuestionMeta.sourceChunk,
                            source: currentQuestionMeta.source || 'Unknown PDF',
                            page: currentQuestionMeta.sourcePage || 'N/A',
                            type: 'Original Question Source'
                        } : null,
                        retrievedChunks: retrievedChunks.map((chunk, idx) => ({
                            text: chunk.text,
                            source: chunk.source || 'Unknown PDF',
                            page: chunk.page !== undefined ? chunk.page : 'N/A',
                            score: chunk.score ? chunk.score.toFixed(3) : 'N/A',
                            type: 'Retrieved',
                            index: idx + 1
                        }))
                    }
                };
            } else {
                // For non-conversation calls (like question generation), return string directly
                return finalResponse;
            }
        }

        // ============================================================
        // Global Functions Exposed to External
        // ============================================================
        //
        // These functions can be called in browser console for debugging or external integration
        //
        // Usage Examples:
        //   // Set API key in console
        //   window.setOpenAIAPIKey('sk-your-api-key-here');
        //
        //   // Load custom question data
        //   window.loadQuizData({QA: {...}, feedback: {...}});
        //
        // ============================================================
        
        /**
         * Load question data (for backend integration)
         * @param {Object} data - Question data object
         */
        window.loadQuizData = function(data) {
            loadData(data);
        };

        /**
         * Programmatically set API key
         * @param {string} apiKey - OpenAI API key
         * 
         * Use Cases:
         *   - Quickly set key via console
         *   - Dynamically inject key during external system integration
         */
        window.setOpenAIAPIKey = function(apiKey) {
            openAIApiKey = apiKey;
            localStorage.setItem('openai_api_key', apiKey);
            // Display last 4 characters of key (for security)
            document.getElementById('openai-api-key').value = '••••••••••••' + apiKey.slice(-4);
            updateApiKeyStatus(true);
            enableMessageInput();
        };
        
        // ============================================================
        // Image Modal Functionality
        // ============================================================
        /**
         * Display image zoom modal
         * @param {string} imagePath - Image path
         */
        function showImageModal(imagePath) {
            // Get or create modal
            let modal = document.getElementById('image-modal');
            if (!modal) {
                modal = document.createElement('div');
                modal.id = 'image-modal';
                modal.className = 'image-modal';
                modal.onclick = function() {
                    // Click background to close modal
                    hideImageModal();
                };
                document.body.appendChild(modal);
            }
            
            // Create or update image element
            let img = modal.querySelector('img');
            if (!img) {
                img = document.createElement('img');
                img.onclick = function(e) {
                    // Clicking image itself doesn't close (prevent event bubbling)
                    e.stopPropagation();
                };
                modal.appendChild(img);
            }
            
            img.src = imagePath;
            modal.classList.add('active');
            
            // Press ESC key to close
            document.addEventListener('keydown', function escHandler(e) {
                if (e.key === 'Escape') {
                    hideImageModal();
                    document.removeEventListener('keydown', escHandler);
                }
            });
        }
        
        /**
         * Hide image zoom modal
         */
        function hideImageModal() {
            const modal = document.getElementById('image-modal');
            if (modal) {
                modal.classList.remove('active');
            }
        }
