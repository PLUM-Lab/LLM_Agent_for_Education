<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Activity Log - Login / Logout</title>
    <style>
        * { box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            margin: 0;
            padding: 24px;
            background: #0f172a;
            color: #e2e8f0;
            min-height: 100vh;
        }
        h1 {
            font-size: 1.5rem;
            font-weight: 600;
            margin: 0 0 8px 0;
        }
        .subtitle {
            color: #94a3b8;
            font-size: 0.875rem;
            margin-bottom: 20px;
        }
        .bar {
            background: #1e293b;
            padding: 12px 16px;
            border-radius: 8px;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 12px;
        }
        .refresh-btn {
            background: #3b82f6;
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.875rem;
        }
        .refresh-btn:hover { background: #2563eb; }
        .auto-label { font-size: 0.75rem; color: #64748b; }
        table {
            width: 100%;
            border-collapse: collapse;
            background: #1e293b;
            border-radius: 8px;
            overflow: hidden;
        }
        th, td {
            padding: 12px 16px;
            text-align: left;
        }
        th {
            background: #334155;
            font-weight: 600;
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }
        tr:nth-child(even) { background: #1e293b; }
        tr:hover { background: #334155; }
        .event-login { color: #22c55e; }
        .event-logout { color: #f59e0b; }
        .profile-cell { font-size: 0.875rem; max-width: 320px; word-break: break-word; }
        .empty {
            text-align: center;
            padding: 48px 24px;
            color: #64748b;
        }
        .error {
            background: #7f1d1d;
            color: #fecaca;
            padding: 12px 16px;
            border-radius: 8px;
            margin-bottom: 20px;
        }
        a { color: #38bdf8; text-decoration: none; }
        a:hover { text-decoration: underline; }
    </style>
</head>
<body>
    <h1>Activity Log</h1>
    <p class="subtitle">Per-user login/logout events (from user_logs). Select a user to view.</p>

    <div class="bar">
        <label class="auto-label">User: </label>
        <select id="user-select" style="padding: 6px 12px; border-radius: 6px; background: #334155; color: #e2e8f0; border: 1px solid #475569;">
            <option value="">— Select user —</option>
        </select>
        <div class="auto-label">Data from RAG server (port 5000).</div>
        <button class="refresh-btn" id="refresh">Refresh</button>
    </div>

    <div id="error" class="error" style="display:none;"></div>
    <table>
        <thead>
            <tr>
                <th>Timestamp</th>
                <th>Event</th>
                <th>User</th>
                <th>Profile</th>
            </tr>
        </thead>
        <tbody id="tbody">
            <tr><td colspan="4" class="empty">Loading...</td></tr>
        </tbody>
    </table>

    <p style="margin-top: 20px;"><a href="medical-quiz.html">Back to Medical Quiz</a></p>

    <script src="rag-config.js"></script>
    <script>
        const RAG_URL = 'http://' + (window.location.hostname || '127.0.0.1') + ':' + (window.RAG_PORT || 5001);

        function showError(msg) {
            const el = document.getElementById('error');
            el.textContent = msg;
            el.style.display = msg ? 'block' : 'none';
        }

        function formatProfile(profile) {
            if (!profile || typeof profile !== 'object') return '—';
            const parts = [];
            if (typeof profile.questionsAnswered === 'number') parts.push('Answered: ' + profile.questionsAnswered);
            if (profile.knowledgeMap && typeof profile.knowledgeMap === 'object') {
                const kcCount = Object.keys(profile.knowledgeMap).length;
                parts.push('KCs: ' + kcCount);
            }
            return parts.length ? parts.join(', ') : JSON.stringify(profile).slice(0, 80) + (JSON.stringify(profile).length > 80 ? '…' : '');
        }

        function escapeHtml(s) {
            if (s == null) return '';
            const div = document.createElement('div');
            div.textContent = String(s);
            return div.innerHTML;
        }

        async function loadUsers() {
            showError('');
            try {
                const r = await fetch(RAG_URL + '/user_log/users', { mode: 'cors' });
                if (!r.ok) throw new Error('HTTP ' + r.status);
                const data = await r.json();
                const users = Array.isArray(data.users) ? data.users : [];
                const sel = document.getElementById('user-select');
                sel.innerHTML = '<option value="">— Select user —</option>' + users.map(function(u) {
                    return '<option value="' + escapeHtml(u) + '">' + escapeHtml(u) + '</option>';
                }).join('');
                if (users.length) sel.value = users[0];
                loadUserLog();
            } catch (e) {
                showError('Cannot reach RAG server (port 5000). ' + (e.message || String(e)));
                render([]);
            }
        }

        async function loadUserLog() {
            const user = document.getElementById('user-select').value;
            if (!user) {
                render([]);
                return;
            }
            showError('');
            try {
                const r = await fetch(RAG_URL + '/user_log?user=' + encodeURIComponent(user), { mode: 'cors' });
                if (!r.ok) throw new Error('HTTP ' + r.status);
                const data = await r.json();
                const list = Array.isArray(data.events) ? data.events : [];
                render(list, user);
            } catch (e) {
                showError('Failed to load log: ' + (e.message || String(e)));
                render([]);
            }
        }

        function render(list, currentUser) {
            const tbody = document.getElementById('tbody');
            if (!list.length) {
                tbody.innerHTML = '<tr><td colspan="4" class="empty">No login/logout events for this user</td></tr>';
                return;
            }
            const sorted = list.slice().sort(function(a, b) {
                const ta = (a.timestamp || '').toString();
                const tb = (b.timestamp || '').toString();
                return tb.localeCompare(ta);
            });
            tbody.innerHTML = sorted.map(function(entry) {
                const event = (entry.event || 'login').toLowerCase();
                const eventClass = event === 'logout' ? 'event-logout' : 'event-login';
                return '<tr>' +
                    '<td>' + escapeHtml(entry.timestamp || '—') + '</td>' +
                    '<td><span class="' + eventClass + '">' + escapeHtml(entry.event || 'login') + '</span></td>' +
                    '<td>' + escapeHtml(currentUser || entry.user || '—') + '</td>' +
                    '<td class="profile-cell">' + escapeHtml(formatProfile(entry.profile)) + '</td>' +
                    '</tr>';
            }).join('');
        }

        document.getElementById('user-select').addEventListener('change', loadUserLog);
        document.getElementById('refresh').addEventListener('click', function() { loadUsers(); });
        loadUsers();
    </script>
</body>
</html>
