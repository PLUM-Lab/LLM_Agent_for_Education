<!DOCTYPE html>
<html>
<head>
    <title>Knowledge Coverage Diagnostic Tool</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            padding: 20px;
            max-width: 1200px;
            margin: 0 auto;
        }
        .section {
            margin: 20px 0;
            padding: 15px;
            border: 1px solid #ddd;
            border-radius: 5px;
        }
        .error { color: red; }
        .warning { color: orange; }
        .success { color: green; }
        pre {
            background: #f5f5f5;
            padding: 10px;
            border-radius: 3px;
            overflow-x: auto;
        }
        button {
            padding: 10px 20px;
            background: #4CAF50;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            margin: 5px;
        }
        button:hover {
            background: #45a049;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            margin: 10px 0;
        }
        th, td {
            border: 1px solid #ddd;
            padding: 8px;
            text-align: left;
        }
        th {
            background-color: #4CAF50;
            color: white;
        }
    </style>
</head>
<body>
    <h1>Knowledge Coverage Diagnostic Tool</h1>
    
    <div class="section">
        <h2>1. Enter username</h2>
        <input type="text" id="userName" placeholder="e.g. FullTest" style="padding: 8px; width: 200px;">
        <button onclick="loadProfile()">Load Profile</button>
    </div>
    
    <div class="section">
        <h2>2. Profile overview</h2>
        <div id="profileOverview"></div>
    </div>
    
    <div class="section">
        <h2>3. Knowledge component analysis</h2>
        <div id="componentAnalysis"></div>
    </div>
    
    <div class="section">
        <h2>4. 问题诊断</h2>
        <div id="diagnosis"></div>
    </div>
    
    <div class="section">
        <h2>5. Console output</h2>
        <pre id="consoleOutput"></pre>
    </div>

    <script>
        let profile = null;
        let allQuestions = [];
        
        function log(message, type = 'info') {
            const output = document.getElementById('consoleOutput');
            const timestamp = new Date().toLocaleTimeString();
            const color = type === 'error' ? 'red' : type === 'warning' ? 'orange' : 'black';
            output.innerHTML += `<span style="color: ${color}">[${timestamp}] ${message}</span>\n`;
            output.scrollTop = output.scrollHeight;
            console.log(message);
        }
        
        async function loadProfile() {
            const userName = document.getElementById('userName').value.trim();
            if (!userName) {
                alert('Please enter a username');
                return;
            }
            
            log(`Starting diagnosis for user: ${userName}`);
            
            // 加载profile
            try {
                const key = 'student_profile_' + userName;
                const stored = localStorage.getItem(key);
                if (!stored) {
                    log(`❌ Profile not found: ${key}`, 'error');
                    return;
                }
                
                profile = JSON.parse(stored);
                log(`✅ Profile loaded: ${userName}`);
                
                // 加载题目
                await loadQuestions();
                
                // 分析
                analyzeProfile();
            } catch (e) {
                log(`❌ 加载profile失败: ${e.message}`, 'error');
            }
        }
        
        async function loadQuestions() {
            try {
                const response = await fetch('generated_domain_questions.json');
                if (!response.ok) {
                    log('⚠️ Cannot load questions file, will use profile data', 'warning');
                    return;
                }
                
                const text = await response.text();
                allQuestions = JSON.parse(text);
                log(`✅ Loaded ${allQuestions.length} questions`);
            } catch (e) {
                log(`⚠️ Failed to load questions: ${e.message}`, 'warning');
            }
        }
        
        function analyzeProfile() {
            if (!profile) return;
            
            // 概览
            const overview = document.getElementById('profileOverview');
            const components = Object.entries(profile.knowledgeMap || {});
            const known = components.filter(([k, v]) => v.status === 'known').length;
            const unknown = components.filter(([k, v]) => v.status === 'unknown').length;
            const coverage = components.length > 0 ? Math.round((known / components.length) * 100) : 0;
            
            overview.innerHTML = `
                <p><strong>Username:</strong> ${profile.userName}</p>
                <p><strong>Questions answered:</strong> ${profile.questionsAnswered || 0}</p>
                <p><strong>Total knowledge components:</strong> ${components.length}</p>
                <p><strong>Known components:</strong> <span class="${known > 0 ? 'success' : 'error'}">${known}</span></p>
                <p><strong>Unknown components:</strong> ${unknown}</p>
                <p><strong>Knowledge Coverage:</strong> <span class="${coverage > 0 ? 'success' : 'error'}">${coverage}%</span></p>
            `;
            
            log(`📊 Profile概览: ${components.length}个组件, ${known}个known, ${unknown}个unknown, Coverage: ${coverage}%`);
            
            // 组件分析
            analyzeComponents(components);
            
            // 诊断
            diagnose(components);
        }
        
        function analyzeComponents(components) {
            const analysis = document.getElementById('componentAnalysis');
            
            // 统计
            let hasTotalQuestions = 0;
            let missingTotalQuestions = 0;
            let correctEqualsTotal = 0;
            let correctLessThanTotal = 0;
            let correctGreaterThanTotal = 0;
            let zeroTotalQuestions = 0;
            
            const problematic = [];
            
            components.forEach(([key, component]) => {
                if (component.totalQuestionsForSubtopic === undefined) {
                    missingTotalQuestions++;
                } else if (component.totalQuestionsForSubtopic === 0) {
                    zeroTotalQuestions++;
                    problematic.push({key, component, issue: 'totalQuestionsForSubtopic is 0'});
                } else {
                    hasTotalQuestions++;
                    
                    if (component.questionsCorrect === component.totalQuestionsForSubtopic) {
                        correctEqualsTotal++;
                    } else if (component.questionsCorrect < component.totalQuestionsForSubtopic) {
                        correctLessThanTotal++;
                    } else {
                        correctGreaterThanTotal++;
                        problematic.push({key, component, issue: 'questionsCorrect > totalQuestionsForSubtopic'});
                    }
                }
            });
            
            // 计算实际应该的coverage
            const shouldBeKnown = correctEqualsTotal;
            const shouldBeCoverage = components.length > 0 ? Math.round((shouldBeKnown / components.length) * 100) : 0;
            
            analysis.innerHTML = `
                <h3>Statistics</h3>
                <table>
                    <tr>
                        <th>Item</th>
                        <th>Count</th>
                        <th>Description</th>
                    </tr>
                    <tr>
                        <td>Has totalQuestionsForSubtopic</td>
                        <td>${hasTotalQuestions}</td>
                        <td>Total questions initialized</td>
                    </tr>
                    <tr>
                        <td>Missing totalQuestionsForSubtopic</td>
                        <td class="${missingTotalQuestions > 0 ? 'warning' : ''}">${missingTotalQuestions}</td>
                        <td>Needs re-evaluation</td>
                    </tr>
                    <tr>
                        <td>questionsCorrect === totalQuestionsForSubtopic</td>
                        <td class="success">${correctEqualsTotal}</td>
                        <td>Should be marked as known</td>
                    </tr>
                    <tr>
                        <td>questionsCorrect < totalQuestionsForSubtopic</td>
                        <td>${correctLessThanTotal}</td>
                        <td>Should be marked as unknown</td>
                    </tr>
                    <tr>
                        <td>questionsCorrect > totalQuestionsForSubtopic</td>
                        <td class="error">${correctGreaterThanTotal}</td>
                        <td>Data anomaly!</td>
                    </tr>
                    <tr>
                        <td>totalQuestionsForSubtopic === 0</td>
                        <td class="error">${zeroTotalQuestions}</td>
                        <td>No matching questions found</td>
                    </tr>
                </table>
                
                <h3>Expected result</h3>
                <p>If all components are correctly evaluated, there should be <strong class="success">${shouldBeKnown}</strong> known components</p>
                <p>Expected Coverage: <strong class="success">${shouldBeCoverage}%</strong></p>
                <p>Current Coverage: <strong class="${coverage === shouldBeCoverage ? 'success' : 'error'}">${coverage}%</strong></p>
            `;
            
            log(`📈 组件分析: ${correctEqualsTotal}个应该known, ${correctLessThanTotal}个应该unknown`);
            log(`📈 预期Coverage: ${shouldBeCoverage}%, 当前Coverage: ${coverage}%`);
            
            // 显示问题组件
            if (problematic.length > 0) {
                let html = '<h3>Problem components</h3><table><tr><th>Key</th><th>Issue</th><th>questionsCorrect</th><th>totalQuestionsForSubtopic</th><th>status</th></tr>';
                problematic.forEach(({key, component, issue}) => {
                    html += `<tr>
                        <td>${key.substring(0, 50)}...</td>
                        <td class="error">${issue}</td>
                        <td>${component.questionsCorrect}</td>
                        <td>${component.totalQuestionsForSubtopic}</td>
                        <td>${component.status}</td>
                    </tr>`;
                });
                html += '</table>';
                analysis.innerHTML += html;
            }
        }
        
        function diagnose(components) {
            const diagnosis = document.getElementById('diagnosis');
            const issues = [];
            
            // 检查1: 是否有totalQuestionsForSubtopic
            const missingTotal = components.filter(([k, v]) => v.totalQuestionsForSubtopic === undefined);
            if (missingTotal.length > 0) {
                issues.push({
                    severity: 'high',
                    message: `${missingTotal.length}个组件缺少totalQuestionsForSubtopic字段`,
                    solution: '需要运行reevaluateKnowledgeStatus()函数来补充该字段'
                });
            }
            
            // 检查2: questionsCorrect > totalQuestionsForSubtopic
            const incorrectCount = components.filter(([k, v]) => 
                v.totalQuestionsForSubtopic !== undefined && 
                v.questionsCorrect > v.totalQuestionsForSubtopic
            );
            if (incorrectCount.length > 0) {
                issues.push({
                    severity: 'high',
                    message: `${incorrectCount.length} components have questionsCorrect > totalQuestionsForSubtopic`,
                    solution: 'This may be due to duplicate answers under old rules; data needs correction'
                });
            }
            
            // 检查3: totalQuestionsForSubtopic === 0
            const zeroTotal = components.filter(([k, v]) => v.totalQuestionsForSubtopic === 0);
            if (zeroTotal.length > 0) {
                issues.push({
                    severity: 'medium',
                    message: `${zeroTotal.length}个组件的totalQuestionsForSubtopic为0`,
                    solution: '这些组件在allQuestions中找不到对应的题目，可能是题目库不匹配'
                });
            }
            
            // 检查4: 所有组件都是unknown
            const allUnknown = components.filter(([k, v]) => v.status === 'unknown').length === components.length;
            if (allUnknown && components.length > 0) {
                issues.push({
                    severity: 'high',
                    message: 'All components are unknown, resulting in 0% Coverage',
                    solution: 'Check if questionsCorrect is less than totalQuestionsForSubtopic for all'
                });
            }
            
            if (issues.length === 0) {
                diagnosis.innerHTML = '<p class="success">✅ 未发现明显问题</p>';
            } else {
                let html = '<h3>Issues found</h3><table><tr><th>Severity</th><th>Issue</th><th>Solution</th></tr>';
                issues.forEach(issue => {
                    const severityClass = issue.severity === 'high' ? 'error' : 'warning';
                    html += `<tr>
                        <td class="${severityClass}">${issue.severity}</td>
                        <td>${issue.message}</td>
                        <td>${issue.solution}</td>
                    </tr>`;
                });
                html += '</table>';
                diagnosis.innerHTML = html;
            }
        }
    </script>
</body>
</html>
