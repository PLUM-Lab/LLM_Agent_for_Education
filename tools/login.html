<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign in - Medical Quiz</title>
    <meta http-equiv="refresh" content="0;url=medical-quiz.html">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #e8f4fc 0%, #f5f5f5 50%, #f0f7ff 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            color: #333;
        }
        .login-card {
            background: white;
            border-radius: 12px;
            box-shadow: 0 8px 32px rgba(74, 144, 226, 0.15);
            padding: 40px;
            width: 100%;
            max-width: 380px;
            border: 1px solid rgba(74, 144, 226, 0.2);
        }
        .login-title {
            font-size: 22px;
            font-weight: 600;
            color: #1a1a2e;
            margin-bottom: 8px;
            text-align: center;
        }
        .login-subtitle {
            font-size: 14px;
            color: #666;
            text-align: center;
            margin-bottom: 28px;
        }
        .form-group {
            margin-bottom: 20px;
        }
        .form-group label {
            display: block;
            font-size: 13px;
            font-weight: 600;
            color: #555;
            margin-bottom: 8px;
        }
        .form-group input {
            width: 100%;
            padding: 12px 14px;
            border: 1px solid #e0e0e0;
            border-radius: 8px;
            font-size: 15px;
            transition: border-color 0.2s, box-shadow 0.2s;
        }
        .form-group input:focus {
            outline: none;
            border-color: #4a90e2;
            box-shadow: 0 0 0 3px rgba(74, 144, 226, 0.15);
        }
        .form-group input::placeholder {
            color: #aaa;
        }
        .submit-btn {
            width: 100%;
            padding: 14px;
            background: #4a90e2;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
        }
        .submit-btn:hover {
            background: #3a7bc8;
        }
        .submit-btn:active {
            transform: scale(0.98);
        }
        .error-msg {
            font-size: 13px;
            color: #c62828;
            margin-top: 12px;
            text-align: center;
            min-height: 20px;
        }
    </style>
</head>
<body>
    <div class="login-card">
        <h1 class="login-title">Medical Quiz</h1>
        <p class="login-subtitle">请使用用户名和密码登录</p>
        <form id="login-form">
            <div class="form-group">
                <label for="username">Username</label>
                <input type="text" id="username" name="username" placeholder="Enter username" autocomplete="username" required>
            </div>
            <div class="form-group">
                <label for="password">密码</label>
                <input type="password" id="password" name="password" placeholder="请输入密码" autocomplete="current-password" required>
            </div>
            <button type="submit" class="submit-btn">Sign in</button>
            <div class="error-msg" id="error-msg" role="alert"></div>
        </form>
    </div>
    <script>
        // 登录已集成到 medical-quiz.html，本页仅做跳转
        window.location.href = 'medical-quiz.html';
    </script>
</body>
</html>
